<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL3-EZ | {% if setup_mode %}Create Account{% else %}Sign In{% endif %}</title>
<script>(function(){var t=localStorage.getItem('asl3ez-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0e1117;
  --bg2:    #161b22;
  --bg3:    #1f2937;
  --border: #30363d;
  --accent: #58a6ff;
  --green:  #3fb950;
  --danger: #f85149;
  --text:   #e6edf3;
  --text2:  #8b949e;
  --text3:  #c9d1d9;
  --radius: 6px;
}
html[data-theme="midnight"] {
  --bg: #000000; --bg2: #0c0c0c; --border: #252525;
  --accent: #4d9cf5; --green: #3aad4e; --danger: #e04444;
  --text: #dde1e7; --text2: #636363; --text3: #b8bcc4;
}
html[data-theme="light"] {
  --bg: #f6f8fa; --bg2: #ffffff; --border: #d0d7de;
  --accent: #0969da; --green: #1a7f37; --danger: #cf222e;
  --text: #1f2328; --text2: #656d76; --text3: #24292f;
}
html[data-theme="terminal"] {
  --bg: #001200; --bg2: #001a00; --border: #1a4d1a;
  --accent: #00e040; --green: #00c030; --danger: #ff3333;
  --text: #00e040; --text2: #007a1a; --text3: #00c030;
}
html[data-theme="amber"] {
  --bg: #0d0800; --bg2: #160e00; --border: #4a3200;
  --accent: #ff9200; --green: #a0c040; --danger: #ff4040;
  --text: #ffb000; --text2: #7a5200; --text3: #e08800;
}
html[data-theme="nord"] {
  --bg: #2e3440; --bg2: #3b4252; --border: #4c566a;
  --accent: #88c0d0; --green: #a3be8c; --danger: #bf616a;
  --text: #eceff4; --text2: #9099a8; --text3: #d8dee9;
}
html[data-theme="mario"] {
  --bg: #1a1464; --bg2: #221a7a; --border: #3c32b0;
  --accent: #e8000d; --green: #1aaa00; --danger: #f85000;
  --text: #f8f8f8; --text2: #c8b840; --text3: #e8e0ff;
}
html[data-theme="dracula"] {
  --bg: #282a36; --bg2: #1e2030; --border: #44475a;
  --accent: #bd93f9; --green: #50fa7b; --danger: #ff5555;
  --text: #f8f8f2; --text2: #6272a4; --text3: #e0d8f8;
}
html[data-theme="monokai"] {
  --bg: #272822; --bg2: #1e1f1a; --border: #49483e;
  --accent: #66d9e8; --green: #a6e22e; --danger: #f92672;
  --text: #f8f8f2; --text2: #75715e; --text3: #cfcfc2;
}
html[data-theme="cyberpunk"] {
  --bg: #0d0d1a; --bg2: #12122a; --border: #2a1a50;
  --accent: #ff00ff; --green: #00ffaa; --danger: #ff0066;
  --text: #e8e0ff; --text2: #8870cc; --text3: #ccbbff;
}
html[data-theme="solarized"] {
  --bg: #fdf6e3; --bg2: #eee8d5; --border: #cdc7b0;
  --accent: #268bd2; --green: #859900; --danger: #dc322f;
  --text: #657b83; --text2: #93a1a1; --text3: #586e75;
}
html[data-theme="cotton-candy"] {
  --bg: #fdf0fc; --bg2: #fff5fe; --border: #ddb8e8;
  --accent: #b44cc0; --green: #2e9e6e; --danger: #c83050;
  --text: #2a1030; --text2: #8850a0; --text3: #1e0820;
}

html { font-size: 15px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 360px;
  padding: 32px 28px;
}

.logo {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 2px;
}

.app-sub {
  font-size: 0.8rem;
  color: var(--text2);
  margin-bottom: 24px;
}

h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.hint {
  font-size: 0.82rem;
  color: var(--text2);
  margin-bottom: 18px;
  line-height: 1.5;
}

.error {
  background: rgba(248,81,73,0.08);
  border: 1px solid rgba(248,81,73,0.3);
  color: var(--danger);
  border-radius: var(--radius);
  padding: 9px 13px;
  font-size: 0.88rem;
  margin-bottom: 16px;
}

.fg {
  margin-bottom: 14px;
}

label {
  display: block;
  font-size: 0.83rem;
  font-weight: 500;
  color: var(--text3);
  margin-bottom: 4px;
}

input[type=text], input[type=password] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 7px 10px;
  font-size: 0.92rem;
  font-family: inherit;
  transition: border-color 0.12s;
  min-height: 36px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

button[type=submit] {
  width: 100%;
  margin-top: 6px;
  padding: 9px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius);
  font-size: 0.92rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.12s;
  min-height: 38px;
}

button[type=submit]:hover {
  background: #4898ef;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">ASL3-EZ</div>
  <div class="app-sub">AllStarLink 3 Manager</div>

  <h2>{% if setup_mode %}Create Account{% else %}Sign In{% endif %}</h2>

  {% if setup_mode %}
  <p class="hint">No account exists yet. Create one to secure access to this node manager.</p>
  {% endif %}

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="fg">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             required autofocus>
    </div>
    <div class="fg">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="{% if setup_mode %}new-password{% else %}current-password{% endif %}"
             required>
    </div>
    {% if setup_mode %}
    <div class="fg">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             autocomplete="new-password" required>
    </div>
    {% endif %}
    <button type="submit">{% if setup_mode %}Create Account{% else %}Sign In{% endif %}</button>
  </form>
</div>
</body>
</html>

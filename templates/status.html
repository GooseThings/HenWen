<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
html[data-theme="midnight"] {
  --bg:      #000000; --bg2:    #0c0c0c; --bg3:    #141414;
  --border:  #252525; --accent: #4d9cf5; --green:  #3aad4e;
  --warn:    #c98a1a; --danger: #e04444; --text:   #dde1e7; --text2:  #636363;
}
html[data-theme="light"] {
  --bg:      #f6f8fa; --bg2:    #ffffff; --bg3:    #eaedf0;
  --border:  #d0d7de; --accent: #0969da; --green:  #1a7f37;
  --warn:    #9a6700; --danger: #cf222e; --text:   #1f2328; --text2:  #656d76;
}
html[data-theme="terminal"] {
  --bg:      #001200; --bg2:    #001a00; --bg3:    #002200;
  --border:  #1a4d1a; --accent: #00e040; --green:  #00c030;
  --warn:    #ffaa00; --danger: #ff3333; --text:   #00e040; --text2:  #007a1a;
}
html[data-theme="amber"] {
  --bg:      #0d0800; --bg2:    #160e00; --bg3:    #1e1500;
  --border:  #4a3200; --accent: #ff9200; --green:  #a0c040;
  --warn:    #ffb800; --danger: #ff4040; --text:   #ffb000; --text2:  #7a5200;
}
html[data-theme="nord"] {
  --bg:      #2e3440; --bg2:    #3b4252; --bg3:    #434c5e;
  --border:  #4c566a; --accent: #88c0d0; --green:  #a3be8c;
  --warn:    #ebcb8b; --danger: #bf616a; --text:   #eceff4; --text2:  #9099a8;
}
html[data-theme="mario"] {
  --bg:      #1a1464; --bg2:    #221a7a; --bg3:    #2e2490;
  --border:  #3c32b0; --accent: #e8000d; --green:  #1aaa00;
  --warn:    #f8c800; --danger: #f85000; --text:   #f8f8f8; --text2:  #c8b840;
}
html[data-theme="dracula"] {
  --bg:      #282a36; --bg2:    #1e2030; --bg3:    #343746;
  --border:  #44475a; --accent: #bd93f9; --green:  #50fa7b;
  --warn:    #f1fa8c; --danger: #ff5555; --text:   #f8f8f2; --text2:  #6272a4;
}
html[data-theme="monokai"] {
  --bg:      #272822; --bg2:    #1e1f1a; --bg3:    #3e3d32;
  --border:  #49483e; --accent: #66d9e8; --green:  #a6e22e;
  --warn:    #e6db74; --danger: #f92672; --text:   #f8f8f2; --text2:  #75715e;
}
html[data-theme="cyberpunk"] {
  --bg:      #0d0d1a; --bg2:    #12122a; --bg3:    #1a1a3a;
  --border:  #2a1a50; --accent: #ff00ff; --green:  #00ffaa;
  --warn:    #ffee00; --danger: #ff0066; --text:   #e8e0ff; --text2:  #8870cc;
}
html[data-theme="solarized"] {
  --bg:      #fdf6e3; --bg2:    #eee8d5; --bg3:    #e5dfc8;
  --border:  #cdc7b0; --accent: #268bd2; --green:  #859900;
  --warn:    #b58900; --danger: #dc322f; --text:   #657b83; --text2:  #93a1a1;
}
html[data-theme="cotton-candy"] {
  --bg:      #fdf0fc; --bg2:    #fff5fe; --bg3:    #f5e6f8;
  --border:  #ddb8e8; --accent: #b44cc0; --green:  #2e9e6e;
  --warn:    #c87820; --danger: #c83050; --text:   #2a1030; --text2:  #8850a0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #070a0f;
  --bg2:     #0d1117;
  --bg3:     #161b24;
  --border:  #21283a;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --warn:    #d29922;
  --danger:  #f85149;
  --text:    #e6edf3;
  --text2:   #8b949e;
  --mono:    'Courier New', Courier, monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 16px; line-height: 1.4; overflow: hidden; }

/* ── Root layout ── */
.board {
  display: flex; flex-direction: column;
  height: 100vh; padding: 16px 20px 12px; gap: 10px;
}

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-shrink: 0;
}
.header-brand { display: flex; align-items: center; gap: 10px; color: var(--text2);
  font-size: 0.9rem; letter-spacing: 0.06em; }
.header-brand strong { color: var(--accent); font-size: 1rem; }
.header-logo { height: 42px; width: 42px; object-fit: contain; flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(63,185,80,.35)); }
.hb-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--green); opacity: 0.25; margin-left: 2px;
}
.hb-dot.pulse { animation: hb-pulse .9s ease-out 1 forwards; }
@keyframes hb-pulse {
  0%   { opacity: 1; transform: scale(1.6); box-shadow: 0 0 9px rgba(63,185,80,.9); }
  60%  { opacity: .6; transform: scale(1.1); box-shadow: 0 0 4px rgba(63,185,80,.4); }
  100% { opacity: .25; transform: scale(1);  box-shadow: none; }
}
.header-clock { font-size: 2.6rem; font-weight: 300; font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em; }
.header-actions { display: flex; align-items: center; gap: 10px; }

.ast-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border); }
.ast-pill.running { border-color: var(--green); color: var(--green); }
.ast-pill.stopped { border-color: var(--danger); color: var(--danger); }
.ast-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.btn-icon { background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.82rem;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: color .15s, border-color .15s; }
.btn-icon:hover { color: var(--text); border-color: var(--text2); }

/* ── Weather ticker ── */
.weather-bar {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 7px;
  padding: 5px 14px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  font-size: 0.85rem; overflow: hidden; min-height: 32px;
}
.weather-location { color: var(--accent); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.weather-sep { color: var(--border); flex-shrink: 0; }
.weather-items { display: flex; gap: 20px; flex-wrap: wrap; overflow: hidden; }
.weather-item { color: var(--text2); white-space: nowrap; }
.weather-item strong { color: var(--text); }
.weather-loading { color: var(--text2); font-style: italic; }

/* ── Main two-row content area ── */
.content-area { display: grid; grid-template-columns: 1fr 280px; grid-template-rows: 55fr 45fr; gap: 10px; flex: 1; min-height: 0; }

/* ── Top row: node + connected ── */
.top-row { display: grid; grid-template-columns: 260px 1fr; gap: 10px; flex: 55; min-height: 0; }

/* ── Node status card ── */
.node-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 16px; display: flex; flex-direction: column; align-items: center;
  gap: 8px; overflow: hidden;
}
.node-label { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--text2); text-transform: uppercase; }
.node-number { font-size: 2.4rem; font-weight: 700; line-height: 1; }
.node-callsign { font-size: 1.25rem; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
.node-location { font-size: 0.78rem; color: var(--text2); text-align: center; }

.keyed-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin: 6px 0 2px; }
.keyed-dot { width: 56px; height: 56px; border-radius: 50%; background: #222;
  border: 3px solid #333; transition: background .4s, border-color .4s, box-shadow .4s; }
.keyed-dot.keyed { background: var(--green); border-color: #5de073;
  box-shadow: 0 0 24px rgba(63,185,80,.65), 0 0 56px rgba(63,185,80,.25);
  animation: pulse-k 1.4s ease-in-out infinite; }
@keyframes pulse-k {
  0%,100% { box-shadow: 0 0 24px rgba(63,185,80,.65), 0 0 56px rgba(63,185,80,.25); }
  50%      { box-shadow: 0 0 38px rgba(63,185,80,.9),  0 0 75px rgba(63,185,80,.4);  }
}
.keyed-label { font-size: 1rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text2); }
.keyed-label.keyed { color: var(--green); }
.link-count { font-size: 0.82rem; color: var(--text2); }
.link-count span { color: var(--text); font-weight: 600; }

.vitals { width: 100%; margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px; }
.vrow { display: flex; justify-content: space-between; padding: 4px 0;
  border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.vrow:last-child { border-bottom: none; }
.vk { color: var(--text2); }
.vv { font-weight: 600; }
.vv.ok   { color: var(--green); }
.vv.warn { color: var(--warn); }

/* ── Connected nodes ── */
.connected-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.card-header { padding: 12px 18px 8px; border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
.card-title { font-size: 0.68rem; letter-spacing: .12em; color: var(--text2); text-transform: uppercase; }
.card-count { font-size: 0.82rem; color: var(--accent); font-weight: 600; }
.node-list { flex: 1; overflow-y: auto; }
.node-list::-webkit-scrollbar { width: 3px; }
.node-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.empty-msg { display: flex; align-items: center; justify-content: center; height: 100%;
  color: var(--text2); font-size: 0.95rem; min-height: 48px; }

.node-row { display: grid; grid-template-columns: 10px 88px 120px 1fr auto;
  gap: 0 14px; align-items: center; padding: 8px 18px;
  border-bottom: 1px solid var(--border); transition: background .15s; }
.node-row:last-child { border-bottom: none; }
.node-row:hover { background: var(--bg3); }
.nr-dot { width: 9px; height: 9px; border-radius: 50%; background: #2a2a2a; border: 1px solid #333;
  margin-top: 4px; }
.nr-dot.keyed { background: var(--green); border-color: var(--green);
  box-shadow: 0 0 5px rgba(63,185,80,.7); }
.nr-dot.connecting { background: #d9a520; border-color: #d9a520;
  box-shadow: 0 0 5px rgba(217,165,32,.6); }
.nr-num  { font-size: 1.05rem; font-weight: 700; font-family: var(--mono); }
.nr-call { font-size: 0.95rem; font-weight: 600; color: var(--accent); letter-spacing: .03em; }
.nr-right { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.nr-loc  { font-size: 0.82rem; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.nr-meta { font-size: 0.72rem; color: var(--text2); display: flex; gap: 10px; flex-wrap: wrap; }
.nr-meta span { white-space: nowrap; }
.nr-meta strong { color: var(--text); }

/* ── Bottom row: activity + map ── */
.bottom-row { display: grid; grid-template-columns: 345px 1fr; gap: 10px; flex: 45; min-height: 0; }

/* ── Activity panel ── */
.activity-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.activity-list { flex: 1; overflow-y: auto; }
.activity-list::-webkit-scrollbar { width: 3px; }
.activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.act-row { display: grid; grid-template-columns: 8px 1fr auto; gap: 0 10px;
  align-items: center; padding: 8px 14px;
  border-bottom: 1px solid var(--border); transition: background .15s; }
.act-row:last-child { border-bottom: none; }
.act-row:hover { background: var(--bg3); }
.act-dot { width: 7px; height: 7px; border-radius: 50%; }
.act-dot.local  { background: var(--green); box-shadow: 0 0 4px rgba(63,185,80,.7); }
.act-dot.global { background: var(--accent); box-shadow: 0 0 4px rgba(88,166,255,.5); }
.act-body { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.act-top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
.act-node { font-size: 0.95rem; font-weight: 700; font-family: var(--mono); }
.act-call { font-size: 0.88rem; font-weight: 600; color: var(--accent); }
.act-loc  { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.act-ts   { font-size: 0.7rem; color: var(--text2); margin-left: auto; }
.act-badge { font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; font-weight: 600;
  letter-spacing: .04em; }
.act-badge.local  { background: rgba(63,185,80,.15); color: var(--green); }
.act-badge.global { background: rgba(88,166,255,.12); color: var(--accent); }

/* ── Map ── */
.map-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden; }
#map { flex: 1; background: #0d1117; }
.leaflet-container { background: #0d1117 !important; }
.leaflet-tile { filter: invert(90%) hue-rotate(180deg) brightness(0.85) saturate(0.8); }
#map.map-native .leaflet-tile { filter: none; }
.leaflet-control-zoom a { background: var(--bg3) !important; color: var(--text) !important;
  border-color: var(--border) !important; }
.map-ctl { display: flex; align-items: center; gap: 5px; margin-left: auto; flex-wrap: wrap; }
.map-ctl-sel { background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 4px; padding: 2px 5px; font-size: 0.7rem; cursor: pointer; }
.map-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; font-weight: 600;
  cursor: pointer; letter-spacing: .04em; transition: all .15s; white-space: nowrap; }
.map-btn.on { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* ── Favorites sidebar ── */
.favorites-card {
  grid-column: 2; grid-row: 1 / span 2;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden; min-height: 0;
}
.fav-list { flex: 1; overflow-y: auto; }
.fav-list::-webkit-scrollbar { width: 3px; }
.fav-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.fav-warn {
  padding: 5px 12px; font-size: 0.67rem; color: var(--warn);
  border-bottom: 1px solid var(--border); background: rgba(255,179,0,.07);
  flex-shrink: 0;
}
.fav-row {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr auto; gap: 0 10px;
  align-items: center; transition: background .15s;
}
.fav-row:last-child { border-bottom: none; }
.fav-row:hover { background: var(--bg3); }
.fav-body { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.fav-top { display: flex; align-items: center; gap: 5px; }
.fav-conn-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--green); box-shadow: 0 0 4px rgba(63,185,80,.7);
}
.fav-num  { font-size: 0.9rem; font-weight: 700; font-family: var(--mono); }
.fav-call { font-size: 0.75rem; font-weight: 600; color: var(--accent); }
.fav-loc  { font-size: 0.67rem; color: var(--text2); overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; }
.fav-actions { display: flex; flex-direction: column; gap: 3px; align-items: stretch; width: fit-content; }
.fav-del-btn { background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 0.65rem; padding: 0 0 0 2px; margin-left: auto; opacity: 0.45;
  line-height: 1; flex-shrink: 0; }
.fav-del-btn:hover { color: #f85149; opacity: 1; }


/* ── Status-board action buttons ── */
.sb-btn {
  font-size: 0.68rem; font-weight: 600; letter-spacing: .03em;
  padding: 3px 8px; border-radius: 4px; border: 1px solid; cursor: pointer;
  white-space: nowrap; transition: all .15s; flex-shrink: 0;
}
.sb-btn.connect    { background: rgba(88,166,255,.08); border-color: rgba(88,166,255,.3); color: var(--accent); }
.sb-btn.connect:hover { background: rgba(88,166,255,.2); }
.sb-btn.monitor    { background: rgba(63,185,80,.08);  border-color: rgba(63,185,80,.3);  color: var(--green); }
.sb-btn.monitor:hover { background: rgba(63,185,80,.2); }
.sb-btn.disconnect { background: rgba(248,81,73,.08);  border-color: rgba(248,81,73,.3);  color: var(--red); }
.sb-btn.disconnect:hover { background: rgba(248,81,73,.2); }
.sb-btn.neutral    { background: var(--bg3); border-color: var(--border); color: var(--text2); }
.sb-btn.neutral:hover { color: var(--text); }
.sb-btn.fav        { background: rgba(232,113,10,.10); border-color: rgba(232,113,10,.35); color: #e8710a; }
.sb-btn.fav:hover  { background: rgba(232,113,10,.22); }

/* always-visible connect bar */
.conn-form-bar { padding: 7px 18px; border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
.conn-form-bar input { width: 100px; font-family: var(--mono); font-size: 0.82rem;
  padding: 3px 7px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg3); color: var(--text); }
.perm-label { font-size: 0.72rem; color: var(--text2); display: inline-flex; align-items: center;
  gap: 4px; user-select: none; cursor: pointer; white-space: nowrap; width: fit-content; }
.perm-label input[type=checkbox] { cursor: pointer; accent-color: var(--accent); width: auto; flex-shrink: 0; }
/* idle-countdown badge in node rows */
.idle-badge { font-size: 0.68rem; padding: 1px 6px; border-radius: 3px; font-weight: 600;
  background: rgba(88,166,255,.1); color: var(--accent); white-space: nowrap; }
.idle-badge.warn { background: rgba(255,179,0,.15); color: var(--warn); }
.idle-squash-btn { font-size: 0.68rem; padding: 1px 6px; border-radius: 3px; font-weight: 600;
  background: rgba(63,185,80,.08); border: 1px solid rgba(63,185,80,.3); color: var(--green);
  cursor: pointer; white-space: nowrap; }
.idle-squash-btn:hover { background: rgba(63,185,80,.22); }

/* toast notification */
#sb-toast { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
  pointer-events: none; opacity: 0; transition: opacity .25s; z-index: 9999;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.6); }
#sb-toast.show { opacity: 1; }
#sb-toast.ok   { background: rgba(30,80,40,.97); border: 1px solid rgba(63,185,80,.7); color: #7ee787; }
#sb-toast.err  { background: rgba(80,25,25,.97); border: 1px solid rgba(248,81,73,.7); color: #ff9492; }

/* ── Footer ── */
.footer { display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 4px 14px; padding-top: 7px; border-top: 1px solid var(--border);
  font-size: 0.76rem; color: var(--text2); flex-shrink: 0; }
.f-stale { color: var(--warn); font-weight: 600; }
</style>
</head>
<body>

<div class="board">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <img class="header-logo" src="/static/logo-512.png" alt="HenWen">
      <strong>HenWen</strong> <span>NODE KIOSK</span><span class="hb-dot" id="hb-dot"></span>
    </div>
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-actions">
      <div class="ast-pill" id="ast-pill"><div class="dot"></div><span id="ast-text">Asterisk</span></div>
      <div id="kiosk-user-bar" style="display:none;align-items:center;gap:8px;font-size:0.75rem">
        <span id="kiosk-username" style="color:var(--text2)"></span>
        <button class="btn-icon" onclick="kioskLogout()">Logout</button>
      </div>
      <button class="btn-icon" id="kiosk-login-btn" onclick="openKioskLogin()" style="display:none">Login</button>
      <button class="btn-icon" onclick="toggleFS()" title="Fullscreen">&#x26F6; Fullscreen</button>
      <a class="btn-icon" href="/henwen-manager">&#8592; Manager</a>
      <audio id="node-audio" preload="none">
        <source type="audio/webm; codecs=opus">
      </audio>
    </div>
  </header>

  <!-- Weather bar -->
  <div class="weather-bar" id="weather-bar">

        <button onclick="closeKioskModal()" style="padding:7px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);cursor:pointer;font-size:0.88rem">Cancel</button>

<div id="sb-toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ── Helpers ── */
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

var _csrfToken = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
function apiFetch(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({'X-CSRFToken': _csrfToken}, opts.headers || {});
  return fetch(url, opts).then(function(r) {
    if (r.status === 401) {
      r.clone().json().then(function(d) {
        if (d.timeout) _handleSessionTimeout();
      }).catch(function(){});
    }
    return r;
  });
}

function _handleSessionTimeout() {
  if (window._sessionTimeoutShown) return;
  window._sessionTimeoutShown = true;
  /* Reset kiosk state */
  window._kioskRole = '';
  updateKioskUserBar(null, null);
  renderFavorites();
  sbToast('Session expired — please log in again', false);
  /* Re-fetch a fresh CSRF token for the new (empty) session */
  fetch('/api/csrf-token').then(function(r) { return r.json(); })
    .then(function(d) { if (d.csrf_token) _csrfToken = d.csrf_token; })
    .catch(function(){});
  setTimeout(function() { window._sessionTimeoutShown = false; }, 10000);
}
function relTime(ts) {
  var d = Math.floor(Date.now()/1000 - ts);
  if (d < 5)    return 'just now';
  if (d < 60)   return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}
var _clockFormat = '24';
var _clockTZ     = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

function nowStr() {
  try {
    var parts = new Intl.DateTimeFormat('en-US', {
      timeZone: _clockTZ,
      hour:     '2-digit',
      minute:   '2-digit',
      second:   '2-digit',
      hour12:   _clockFormat === '12',
    }).formatToParts(new Date());
    var h = '', m = '', s = '', ap = '';
    for (var i = 0; i < parts.length; i++) {
      if (parts[i].type === 'hour')      h  = parts[i].value;
      if (parts[i].type === 'minute')    m  = parts[i].value;
      if (parts[i].type === 'second')    s  = parts[i].value;
      if (parts[i].type === 'dayPeriod') ap = parts[i].value;
    }
    return h + ':' + m + ':' + s + (ap ? ' ' + ap : '');
  } catch(e) {
    var n = new Date();
    return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  }
}

/* ── Clock ── */
function tickClock() {
  document.getElementById('clock').textContent = nowStr();
}
setInterval(tickClock, 1000); tickClock();

/* Load clock format + timezone from kiosk settings */
fetch('/api/kiosk/settings').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
  if (!d) return;
  if (d.clock_format) _clockFormat = d.clock_format;
  if (d.timezone)     _clockTZ     = d.timezone;
}).catch(function(){});

/* ── Fullscreen ── */
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}

/* ── Leaflet map ── */
var _map            = null;
var _markers        = [];
var _lines          = [];
var _grayLayer      = null;
var _currentTile    = null;

/* Toggle state */
var _showGlobal   = true;
var _showLines    = true;
var _showGrayline = true;

/* Data state */
var _hostedNodes        = [];  /* [{node,callsign,location,lat,lon}] from board refresh */
var _connectedNodes     = [];  /* [{node,callsign,location,lat,lon,host_lat,host_lon}] */
var _lastActivityPoints = [];  /* combined activity list */
var _mapFitted          = false;

/* Tile layer definitions: darkFilter=true means keep OSM invert CSS */
var _tileDefs = {
  'dark':      { url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',           maxZoom:18, darkFilter:true  },
  'carto-dk':  { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',maxZoom:19, darkFilter:false },
  'carto-lt':  { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',maxZoom:19,darkFilter:false },
  'topo':      { url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',              maxZoom:17, darkFilter:false },
  'satellite': { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', maxZoom:18, darkFilter:false },
};

function changeTiles(key) {
  var def = _tileDefs[key] || _tileDefs['dark'];
  if (_currentTile) _map.removeLayer(_currentTile);
  _currentTile = L.tileLayer(def.url, {maxZoom: def.maxZoom}).addTo(_map);
  /* Move tile layer to bottom so markers stay on top */
  _currentTile.bringToBack();
  document.getElementById('map').classList.toggle('map-native', !def.darkFilter);
  localStorage.setItem('henwen-maptiles', key);
}

function toggleLayer(which, btn) {
  if (which === 'global')   _showGlobal   = !_showGlobal;
  if (which === 'lines')    _showLines    = !_showLines;
  if (which === 'grayline') _showGrayline = !_showGrayline;
  btn.classList.toggle('on');
  updateMap();
}

function initMap() {
  if (_map) return;
  _map = L.map('map', {
    zoomControl: true, attributionControl: false,
    center: [20, 0], zoom: 2, minZoom: 1,
    /* Clamp panning to the range covered by the 3-copy grayline (-540° to +540°) */
    maxBounds: [[-90, -540], [90, 540]],
    maxBoundsViscosity: 1.0,
  });

  /* Load saved tile pref */
  var saved = localStorage.getItem('henwen-maptiles') || localStorage.getItem('asl3ez-maptiles') || 'dark';
  var sel = document.getElementById('map-tile-sel');
  if (sel) sel.value = saved;
  changeTiles(saved);

  _map.on('zoomend', function() { updateMap(); });
}

function pinSize() {
  if (!_map) return [16, 24];
  var z = _map.getZoom();
  if (z <= 2)  return [10, 15];
  if (z <= 4)  return [14, 21];
  if (z <= 6)  return [18, 27];
  if (z <= 8)  return [22, 33];
  return [26, 39];
}

function starSize() {
  if (!_map) return [24, 24];
  var z = _map.getZoom();
  if (z <= 2)  return [14, 14];
  if (z <= 4)  return [18, 18];
  if (z <= 6)  return [24, 24];
  if (z <= 8)  return [30, 30];
  return [36, 36];
}

function makeIcon(color) {
  var s = pinSize();
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + s[0] + '" height="' + s[1] +
    '" viewBox="0 0 20 30"><path d="M10 0C4.5 0 0 4.5 0 10c0 7.5 10 20 10 20S20 17.5 20 10C20 4.5 15.5 0 10 0z"' +
    ' fill="' + color + '" opacity="0.9"/><circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/></svg>';
  return L.divIcon({ html:svg, iconSize:s, iconAnchor:[s[0]/2,s[1]], popupAnchor:[0,-s[1]], className:'' });
}

function makeStarIcon(color) {
  var s = starSize();
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + s[0] + '" height="' + s[1] +
    '" viewBox="0 0 32 32"><polygon points="16,2 20,12 31,12 22,19 25,30 16,23 7,30 10,19 1,12 12,12"' +
    ' fill="' + color + '" stroke="white" stroke-width="1.5" opacity="0.95"/></svg>';
  return L.divIcon({ html:svg, iconSize:s, iconAnchor:[s[0]/2,s[1]/2], popupAnchor:[0,-s[1]/2], className:'' });
}

/* ── Grayline (day/night terminator) ── */
function _solarPos() {
  var d = new Date(), rad = Math.PI / 180;
  var n = d.getTime() / 86400000 - 10957.5;      /* days since J2000.0 */
  var L = (280.460 + 0.9856474 * n) % 360;
  var g = ((357.528 + 0.9856003 * n) % 360) * rad;
  var lam = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2*g)) * rad;
  var eps = (23.439 - 0.0000004 * n) * rad;
  var dec = Math.asin(Math.sin(eps) * Math.sin(lam)) / rad;
  var ra  = Math.atan2(Math.cos(eps) * Math.sin(lam), Math.cos(lam)) / rad;
  var GMST = ((280.46061837 + 360.98564736629 * n) % 360 + 360) % 360;
  var lonS = ((ra - GMST + 360) % 360);
  if (lonS > 180) lonS -= 360;
  return { dec: dec, lonS: lonS };
}

function _buildNightPoly() {
  var sol = _solarPos(), rad = Math.PI / 180;
  var dec = sol.dec, lonS = sol.lonS;
  if (Math.abs(dec) < 0.1) dec = 0.1;
  var pts = [];
  for (var lon = -180; lon <= 180; lon += 2) {
    var dL  = (lon - lonS) * rad;
    var lat = Math.atan(-Math.cos(dL) / Math.tan(dec * rad)) / rad;
    pts.push([lat, lon]);
  }
  if (dec > 0) { pts.push([-89.9, 180]); pts.push([-89.9, -180]); }
  else         { pts.push([ 89.9, 180]); pts.push([ 89.9, -180]); }
  return pts;
}

function updateGrayline() {
  if (_grayLayer) { _map.removeLayer(_grayLayer); _grayLayer = null; }
  if (!_showGrayline || !_map) return;
  var base = _buildNightPoly();
  var opts = { color:'transparent', fillColor:'#000020', fillOpacity:0.38, interactive:false };
  /* Render at -360°, 0°, +360° offsets so the overlay covers all repeated world copies
     that Leaflet shows at low zoom levels */
  var layers = [-360, 0, 360].map(function(off) {
    return L.polygon(base.map(function(p){ return [p[0], p[1] + off]; }), opts);
  });
  _grayLayer = L.layerGroup(layers).addTo(_map);
  layers.forEach(function(l){ try { l.bringToBack(); } catch(e){} });
}

/* ── Master map renderer ── */
function updateMap() {
  if (!_map) return;

  /* Clear markers and lines */
  _markers.forEach(function(m) { _map.removeLayer(m); });
  _markers = [];
  _lines.forEach(function(l) { _map.removeLayer(l); });
  _lines = [];

  var allPinned = [];

  /* 1. Hosted-node gold stars */
  _hostedNodes.forEach(function(n) {
    if (n.lat == null || n.lon == null) return;
    var m = L.marker([n.lat, n.lon], {icon:makeStarIcon('#ffd700'), zIndexOffset:1000})
      .bindPopup('<b>&#11088; ' + esc(n.callsign||n.node) + '</b><br>' +
                 esc(n.location||'') + '<br><small>Node ' + esc(n.node) + ' &mdash; this server</small>');
    m.addTo(_map); _markers.push(m);
    allPinned.push(n);
  });

  /* 2. Connected-node red pins + dashed lines to their hosted node */
  _connectedNodes.forEach(function(c) {
    if (c.lat == null || c.lon == null) return;
    var m = L.marker([c.lat, c.lon], {icon:makeIcon('#e74c3c'), zIndexOffset:500})
      .bindPopup('<b>' + esc(c.callsign||c.node) + '</b><br>' +
                 esc(c.location||'') + '<br><small>Node ' + esc(c.node) + ' &mdash; connected</small>');
    m.addTo(_map); _markers.push(m);
    allPinned.push(c);
    if (_showLines && c.host_lat != null && c.host_lon != null) {
      var line = L.polyline([[c.lat, c.lon], [c.host_lat, c.host_lon]], {
        color:'#e74c3c', weight:1.5, opacity:0.55, dashArray:'5 6', interactive:false
      }).addTo(_map);
      _lines.push(line);
    }
  });

  /* 3. Activity pins: local (green) always shown; global (blue) only if _showGlobal */
  var actPts = _lastActivityPoints.filter(function(p) {
    return p.lat != null && p.lon != null && (_showGlobal || p.type === 'local');
  });
  actPts.forEach(function(p) {
    var color = p.type === 'local' ? '#3fb950' : '#58a6ff';
    var m = L.marker([p.lat, p.lon], {icon:makeIcon(color)})
      .bindPopup('<b>' + esc(p.callsign||p.node) + '</b><br>' +
                 esc(p.location||'') + '<br><small>Node ' + esc(p.node) +
                 (p.type==='local' ? ' &mdash; keyed' : ' &mdash; online') + '</small>');
    m.addTo(_map); _markers.push(m);
    allPinned.push(p);
  });

  /* Auto-fit on first data load only */
  if (!_mapFitted && allPinned.length > 0) {
    var lats = allPinned.map(function(p){return p.lat;}).filter(function(v){return v!=null;});
    var lons = allPinned.map(function(p){return p.lon;}).filter(function(v){return v!=null;});
    if (lats.length) {
      _map.fitBounds([
        [Math.min.apply(null,lats)-3, Math.min.apply(null,lons)-3],
        [Math.max.apply(null,lats)+3, Math.max.apply(null,lons)+3]
      ], {padding:[15,15], maxZoom:7});
      _mapFitted = true;
    }
  }

  /* Grayline — rebuild each render so time stays current */
  updateGrayline();
}

/* ── Weather bar ── */
async function refreshWeather() {
  try {
    var r = await apiFetch('/api/status/weather');
    if (!r.ok) return;
    var w = await r.json();
    var bar = document.getElementById('weather-bar');
    if (w.error && !w.temp_f && !w.temp_c) {
      bar.innerHTML = '<span class="weather-loading">Weather unavailable</span>';
      return;
    }
    var temp = '';
    if (w.temp_f && w.temp_c) temp = w.temp_f + '°F / ' + w.temp_c + '°C';
    else if (w.temp_f) temp = w.temp_f + '°F';
    else if (w.temp_c) temp = w.temp_c + '°C';

    var html = '<span class="weather-location">&#127748; ' + esc(w.location) + '</span>';
    if (w.stale) html += '<span class="weather-item" title="Weather service unreachable — showing last known data" style="color:var(--text2)">(stale)</span>';
    html += '<span class="weather-sep">|</span>';
    html += '<div class="weather-items">';
    if (w.desc)     html += '<span class="weather-item"><strong>' + esc(w.desc) + '</strong></span>';
    if (temp)       html += '<span class="weather-item">Temp: <strong>' + esc(temp) + '</strong></span>';
    if (w.humidity) html += '<span class="weather-item">Humidity: <strong>' + esc(w.humidity) + '%</strong></span>';
    if (w.wind_mph) html += '<span class="weather-item">Wind: <strong>' + esc(w.wind_mph) + ' mph ' + esc(w.wind_dir||'') + '</strong></span>';
    html += '</div>';
    bar.innerHTML = html;
  } catch(e) {}
}

/* ── Board data ── */
async function refreshBoard() {
  try {
    var r = await apiFetch('/api/status/board', {cache: 'no-store'});
    if (!r.ok) return;
    var data = await r.json();

    /* Asterisk pill */
    var pill = document.getElementById('ast-pill');
    pill.className = 'ast-pill ' + (data.asterisk_active ? 'running' : 'stopped');
    document.getElementById('ast-text').textContent =
      data.asterisk_active ? 'Asterisk Running' : 'Asterisk Stopped';

    /* Node card */
    var nodes = data.nodes || [];
    window._lastBoardNodes = nodes;
    var nc = document.getElementById('node-card');
    if (!nodes.length) {
      nc.innerHTML = '<div class="node-label">NODE</div><div style="color:var(--text2)">No nodes configured</div>';
    } else {
      var n = nodes[0]; var keyed = n.keyed;
      var temp = data.cpu_temp != null ? data.cpu_temp + ' °C' : 'N/A';
      var tcls = data.cpu_temp != null ? (data.cpu_temp > 75 ? 'warn' : 'ok') : '';
      var disk = data.disk ? data.disk.used+'/'+data.disk.total+' ('+data.disk.pct+')' : 'N/A';
      nc.innerHTML =
        '<div class="node-label">NODE</div>' +
        '<div class="node-number">' + esc(n.node) + '</div>' +
        (n.callsign ? '<div class="node-callsign">' + esc(n.callsign) + '</div>' : '') +
        (n.location ? '<div class="node-location">' + esc(n.location) + '</div>' : '') +
        '<div class="keyed-wrap">' +
          '<div class="keyed-dot' + (keyed ? ' keyed' : '') + '"></div>' +
          '<div class="keyed-label' + (keyed ? ' keyed' : '') + '">' + (keyed ? 'KEYED' : 'IDLE') + '</div>' +
        '</div>' +
        '<div class="link-count">Linked: <span>' + (n.connected ? n.connected.length : 0) + '</span></div>' +
        (n.stale ? '<div style="font-size:.7rem;color:var(--warn)">&#9888; Stale</div>' : '') +
        '<div class="vitals">' +
          '<div class="vrow"><span class="vk">Uptime</span><span class="vv">' + esc(data.uptime||'—') + '</span></div>' +
          '<div class="vrow"><span class="vk">CPU Temp</span><span class="vv ' + tcls + '">' + esc(temp) + '</span></div>' +
          '<div class="vrow"><span class="vk">Disk</span><span class="vv">' + esc(disk) + '</span></div>' +
          '<div class="vrow"><span class="vk">AMI</span><span class="vv ' + (data.ami_connected ? 'ok':'warn') + '">' + (data.ami_connected ? 'Connected':'Connecting') + '</span></div>' +
        '</div>';
    }

    /* Update hosted-node star pins */
    _hostedNodes = nodes.filter(function(n){ return n.lat != null && n.lon != null; })
      .map(function(n){ return {node:n.node, callsign:n.callsign, location:n.location, lat:n.lat, lon:n.lon}; });

    /* Connected nodes with lat/lon for red map pins */
    _connectedNodes = [];
    nodes.forEach(function(n) {
      (n.connected||[]).forEach(function(c) {
        if (c.lat != null && c.lon != null) {
          _connectedNodes.push({
            node:c.node, callsign:c.callsign, location:c.location,
            lat:c.lat, lon:c.lon,
            host_lat:n.lat, host_lon:n.lon,
          });
        }
      });
    });

    /* Connected nodes */
    var allLinked = [];
    nodes.forEach(function(n) {
      (n.connected||[]).forEach(function(c) {
        allLinked.push(Object.assign({}, c, {local_node: n.node}));
      });
    });
    var nl = document.getElementById('node-list');
    document.getElementById('conn-count').textContent = allLinked.length ? allLinked.length + ' linked' : '';
    if (!allLinked.length) {
      nl.innerHTML = '<div class="empty-msg">No nodes linked</div>';
    } else {
      nl.innerHTML = allLinked.map(function(c) {
        var meta = [];
        var isConn = (c.connect_state || 'ESTABLISHED') === 'ESTABLISHED';
        if (c.connect_time) meta.push('Conn: <strong>' + esc(c.connect_time) + '</strong>');
        if (c.keyups)       meta.push('Keys: <strong>' + c.keyups + '</strong>');
        if (c.last_keyed)   meta.push('Last: <strong>' + relTime(c.last_keyed) + '</strong>');
        var idleBadge = '';
        if (c.permanent === false && typeof c.idle_remaining === 'number') {
          var mins = Math.floor(c.idle_remaining / 60);
          var secs = c.idle_remaining % 60;
          var ts   = mins + ':' + (secs < 10 ? '0' : '') + secs;
          var warn = c.idle_remaining < 120;
          idleBadge = '<span class="idle-badge' + (warn ? ' warn' : '') + '">Idle: ' + ts + '</span>';
          if (window._kioskRole === 'admin' || window._kioskRole === 'superuser') {
            idleBadge += '<button class="idle-squash-btn" onclick="sbSquashIdle(\'' +
              esc(c.local_node) + '\',\'' + esc(c.node) + '\',this)" ' +
              'title="Upgrade to permanent connection — disables idle timeout and auto-reconnects if dropped">No Timeout</button>';
          }
        } else if (c.permanent === true) {
          idleBadge = '<span class="idle-badge">Permanent</span>';
        }
        var dotClass = !isConn ? ' connecting' : (c.keyed ? ' keyed' : '');
        var dcBtn = '<button class="sb-btn disconnect" onclick="sbDisconnect(\'' +
          esc(c.local_node) + '\',\'' + esc(c.node) + '\',this)">Disconnect</button>';
        return '<div class="node-row">' +
          '<div class="nr-dot' + dotClass + '"></div>' +
          '<div class="nr-num">' + esc(c.node) + '</div>' +
          '<div class="nr-call">' + esc(c.callsign||'—') + '</div>' +
          '<div class="nr-right">' +
            '<div class="nr-loc">' + esc(c.location||c.desc||'') + '</div>' +
            (meta.length ? '<div class="nr-meta"><span>' + meta.join('</span><span>') + '</span>' + idleBadge + '</div>' : (idleBadge ? '<div class="nr-meta">' + idleBadge + '</div>' : '')) +
            (!isConn ? '<div class="nr-meta" style="color:var(--warn)">Connecting…</div>' : '') +
          '</div>' +
          dcBtn +
        '</div>';
      }).join('');
    }

    /* Footer */
    var elUptime = document.getElementById('f-uptime');
    if (elUptime) elUptime.textContent = data.uptime || '—';

    /* Re-render map whenever board data changes */
    updateMap();

    /* Keep favorites sidebar in sync with connected state */
    renderFavorites();

    triggerHeartbeat();
  } catch(e) {}
}

/* ── Activity feed + map ── */
async function refreshActivity() {
  try {
    var r = await apiFetch('/api/status/activity', {cache: 'no-store'});
    if (!r.ok) return;
    var data = await r.json();

    /* Exclude nodes that are currently connected — they belong in the connected-nodes panel */
    var connectedSet = {};
    _connectedNodes.forEach(function(c) { connectedSet[c.node] = true; });
    /* Also build connected set from all linked nodes (covers nodes without geocoords) */
    var allLinkedNow = [];
    (window._lastBoardNodes||[]).forEach(function(n){ (n.connected||[]).forEach(function(c){ allLinkedNow.push(c.node); }); });
    allLinkedNow.forEach(function(id){ connectedSet[id] = true; });

    var keyed   = (data.recently_keyed || []).filter(function(e){ return !connectedSet[e.node]; });
    var globals = (data.global_nodes   || []).filter(function(g){ return !connectedSet[g.node]; });

    /* Deduplicate: local entries take priority */
    var seenNodes = {};
    keyed.forEach(function(e) { seenNodes[e.node] = true; });
    var globalOnly = globals.filter(function(g) { return !seenNodes[g.node]; });

    var combined = keyed.map(function(e) {
      return {node:e.node, callsign:e.callsign, location:e.location,
              lat:e.lat, lon:e.lon, ts:e.ts, type:'local'};
    }).concat(globalOnly.map(function(g) {
      return {node:g.node, callsign:g.callsign, location:g.location,
              lat:g.lat, lon:g.lon, ts:g.ts, type:'global'};
    }));
    combined.sort(function(a,b){ return b.ts - a.ts; });

    /* Activity list — no keyed/online badge, just source dot + node info + connect btn */
    var al = document.getElementById('activity-list');
    document.getElementById('act-count').textContent = combined.length ? combined.length + ' nodes' : '';
    var updEl = document.getElementById('act-updated');
    if (updEl && data.global_updated) updEl.textContent = 'hub sweep ' + relTime(data.global_updated);
    if (!combined.length) {
      al.innerHTML = '<div class="empty-msg">No activity data yet</div>';
    } else {
      var localNode = (window._lastBoardNodes && window._lastBoardNodes[0])
                      ? window._lastBoardNodes[0].node : '';
      al.innerHTML = combined.map(function(e) {
        var connBtn = localNode
          ? '<div style="display:flex;flex-direction:column;gap:3px;align-items:stretch">' +
              '<button class="sb-btn connect" onclick="sbConnect(\'' +
                esc(localNode) + '\',\'' + esc(e.node) + '\',this,false,false)">Connect</button>' +
              '<button class="sb-btn monitor" onclick="sbConnect(\'' +
                esc(localNode) + '\',\'' + esc(e.node) + '\',this,false,true)">Monitor</button>' +
            '</div>'
          : '';
        return '<div class="act-row">' +
          '<div class="act-dot ' + e.type + '"></div>' +
          '<div class="act-body">' +
            '<div class="act-top">' +
              '<span class="act-node">' + esc(e.node) + '</span>' +
              (e.callsign ? '<span class="act-call">' + esc(e.callsign) + '</span>' : '') +
              '<span class="act-ts">' + (e.ts ? relTime(e.ts) : '') + '</span>' +
            '</div>' +
            '<div class="act-loc">' + esc(e.location||'') + '</div>' +
          '</div>' +
          connBtn +
        '</div>';
      }).join('');
    }

    _lastActivityPoints = combined;
    updateMap();

    var pinMin = data.pin_duration_min || 60;
    var pinLabel = document.getElementById('map-pin-dur-label');
    if (pinLabel) pinLabel.textContent = '· pins ' + pinMin + ' min';
  } catch(e) {}
}

/* ── Status-board connect / disconnect ── */
var _sbToastTimer = null;
function sbToast(msg, ok) {
  var t = document.getElementById('sb-toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'show ' + (ok ? 'ok' : 'err');
  if (_sbToastTimer) clearTimeout(_sbToastTimer);
  _sbToastTimer = setTimeout(function() { t.className = ''; }, 3500);
}

async function sbConnect(localNode, remoteNode, btn, permanent, monitor) {
  var label = monitor ? 'Monitor' : 'Connect';
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    var r = await apiFetch('/api/status/connect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({local_node: localNode, remote_node: remoteNode, permanent: !!permanent, monitor: !!monitor})
    });
    var d = await r.json();
    if (r.ok && d.ok) {
      sbToast((monitor ? 'Monitoring' : 'Connecting to') + ' ' + remoteNode + '…', true);
      setTimeout(refreshBoard, 1500);
    } else if (r.status === 401) {
      if (btn) { btn.disabled = false; btn.textContent = label; }
      openKioskLogin(sbConnect, [localNode, remoteNode, null, permanent, monitor]);
    } else {
      sbToast(label + ' failed: ' + (d.error || r.status), false);
      if (btn) { btn.disabled = false; btn.textContent = label; }
    }
  } catch(e) {
    sbToast(label + ' error: ' + e.message, false);
    if (btn) { btn.disabled = false; btn.textContent = label; }
  }
}

async function sbDisconnect(localNode, remoteNode, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    var r = await apiFetch('/api/status/disconnect', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({local_node: localNode, remote_node: remoteNode})
    });
    var d = await r.json();
    if (r.ok && d.ok) {
      sbToast('Disconnected ' + remoteNode, true);
      setTimeout(refreshBoard, 1500);
    } else if (r.status === 401) {
      if (btn) { btn.disabled = false; btn.textContent = 'Disconnect'; }
      openKioskLogin(sbDisconnect, [localNode, remoteNode, null]);
    } else {
      sbToast('Disconnect failed: ' + (d.error || r.status), false);
      if (btn) { btn.disabled = false; btn.textContent = 'Disconnect'; }
    }
  } catch(e) {
    sbToast('Disconnect error: ' + e.message, false);
    if (btn) { btn.disabled = false; btn.textContent = 'Disconnect'; }
  }
}

async function sbSquashIdle(localNode, remoteNode, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

    sbToast('Error: ' + e.message, false);
    if (btn) { btn.disabled = false; btn.textContent = 'No Timeout'; }

async function statusConnectNew() {

/* ── Kiosk login modal ── */
var _pendingAction = null;  // {fn, args} to call after login

function openKioskLogin(pendingFn, pendingArgs) {
  _pendingAction = pendingFn ? {fn: pendingFn, args: pendingArgs || []} : null;
  var modal = document.getElementById('kiosk-modal-overlay');
  modal.style.display = 'flex';
  document.getElementById('kl-user').value  = '';
  document.getElementById('kl-pass').value  = '';
  document.getElementById('kl-error').textContent = '';
  setTimeout(function(){ document.getElementById('kl-user').focus(); }, 50);
}

function closeKioskModal() {
  document.getElementById('kiosk-modal-overlay').style.display = 'none';
  _pendingAction = null;
}

async function kioskLogin() {
  var username = document.getElementById('kl-user').value.trim();
  var password = document.getElementById('kl-pass').value;
  document.getElementById('kl-error').textContent = '';
  var r, d;
  try {
    r = await apiFetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: username, password: password})
    });
    d = await r.json();
  } catch(e) {
    document.getElementById('kl-error').textContent = 'Request error — try reloading the page';
    return;
  }
  if (r.ok && d.ok) {
    window._kioskRole = d.role;
    /* session.clear() on the server invalidated the CSRF token from the meta tag;
       refresh _csrfToken so subsequent apiFetch calls don't get 400s. */
    if (d.csrf_token) _csrfToken = d.csrf_token;
    closeKioskModal();
    updateKioskUserBar(d.username, d.role);
    var pl = document.getElementById('perm-label');
    if (pl) pl.style.display = (d.role === 'admin' || d.role === 'superuser') ? '' : 'none';
    if (_pendingAction) {
      _pendingAction.fn.apply(null, _pendingAction.args);
      _pendingAction = null;
    }
  } else {
    document.getElementById('kl-error').textContent = d.error || ('Login failed (HTTP ' + r.status + ')');
  }
}

async function kioskLogout() {
  await apiFetch('/logout');
  /* /logout clears the session, invalidating the CSRF token in our meta tag.
     /login (the redirect target) regenerates one for the fresh session.
     Fetch a new token so the next login attempt succeeds without a page reload. */
  try {
    var tr = await fetch('/api/csrf-token');
    var td = await tr.json();
    if (td.csrf_token) _csrfToken = td.csrf_token;
  } catch(e) { /* non-fatal — a page reload would also fix it */ }
  window._kioskRole = '';
  updateKioskUserBar(null, null);
  renderFavorites();
  sbToast('Logged out', true);
}

function updateKioskUserBar(username, role) {
  var bar = document.getElementById('kiosk-user-bar');
  var btn = document.getElementById('kiosk-login-btn');
  if (username) {
    document.getElementById('kiosk-username').textContent = username + ' (' + role + ')';
    bar.style.display = 'flex';
    btn.style.display = 'none';
  } else {
    bar.style.display = 'none';
    btn.style.display = '';
  }
}

async function checkKioskSession() {
  var r = await apiFetch('/api/session');
  var d = await r.json();
  if (d.logged_in) {
    window._kioskRole = d.role;
    updateKioskUserBar(d.username, d.role);
  } else {
    window._kioskRole = '';
    updateKioskUserBar(null, null);
  }
  /* Show Permanent checkbox only for admin/superuser */
  var pl = document.getElementById('perm-label');
  if (pl) pl.style.display = (window._kioskRole === 'admin' || window._kioskRole === 'superuser') ? '' : 'none';
}

/* ── Heartbeat indicator ── */
function triggerHeartbeat() {
  var dot = document.getElementById('hb-dot');
  if (!dot) return;
  dot.classList.remove('pulse');
  void dot.offsetWidth; /* force reflow to restart animation */
  dot.classList.add('pulse');
}

/* ── Favorites sidebar ── */
var _favorites = [];

async function loadFavorites() {
  try {
    var r = await apiFetch('/api/favorites', {cache: 'no-store'});
    if (!r.ok) return;
    var d = await r.json();
    _favorites = d.favorites || [];
    renderFavorites();
  } catch(e) {}
}

function renderFavorites() {
  var fl  = document.getElementById('fav-list');
  var fc  = document.getElementById('fav-count');
  var fw  = document.getElementById('fav-warn');
  if (!fl) return;

  if (!_favorites.length) {
    fl.innerHTML = '<div class="empty-msg" style="font-size:0.8rem">No favorites saved</div>';
    fc.textContent = '';
    fw.style.display = 'none';
    return;
  }

  /* Build set of currently connected node numbers */
  var connSet = {};
  (window._lastBoardNodes || []).forEach(function(n) {
    (n.connected || []).forEach(function(c) { connSet[c.node] = true; });
  });
  var anyConn   = Object.keys(connSet).length > 0;
  var localNode = (window._lastBoardNodes && window._lastBoardNodes[0])
                  ? window._lastBoardNodes[0].node : '';

  var isAdmin = (window._kioskRole === 'admin' || window._kioskRole === 'superuser');
  /* Warning banner only applies to kiosk users who are limited to one connection */
  fw.style.display = (anyConn && !isAdmin) ? '' : 'none';
  fc.textContent   = _favorites.length + ' saved';

  fl.innerHTML = _favorites.map(function(f) {
    var isConn  = !!connSet[f.node];
    var dot     = isConn ? '<span class="fav-conn-dot"></span>' : '';
    var name    = f.label || f.callsign || '';
    var loc     = f.location || '';

    var actions;
    if (isConn) {
      actions = '<button class="sb-btn disconnect" onclick="favDisconnect(\'' +
        esc(localNode) + '\',\'' + esc(f.node) + '\',this)">Disconnect</button>';
    } else if (anyConn && !isAdmin) {
      /* Kiosk users can only have one connection at a time */
      actions = '<button class="sb-btn connect" disabled ' +
        'style="opacity:.4;cursor:not-allowed" ' +
        'title="Disconnect all nodes before connecting">Connect</button>' +
        '<button class="sb-btn monitor" disabled ' +
        'style="opacity:.4;cursor:not-allowed" ' +
        'title="Disconnect all nodes before connecting">Monitor</button>';
    } else {
      actions = '<button class="sb-btn connect" onclick="favConnect(\'' +
        esc(localNode) + '\',\'' + esc(f.node) + '\',this)">Connect</button>' +
        '<button class="sb-btn monitor" onclick="favMonitor(\'' +
        esc(localNode) + '\',\'' + esc(f.node) + '\',this)">Monitor</button>';
    }

    return '<div class="fav-row">' +
      '<div class="fav-body">' +
        '<div class="fav-top">' + dot +
          '<span class="fav-num">' + esc(f.node) + '</span>' +
          (name ? '<span class="fav-call">' + esc(name) + '</span>' : '') +
          '<button class="fav-del-btn" onclick="removeFavorite(\'' + esc(f.node) + '\')" title="Remove from Favorites">✕</button>' +
        '</div>' +
        (loc ? '<div class="fav-loc">' + esc(loc) + '</div>' : '') +
      '</div>' +
      '<div class="fav-actions">' + actions + '</div>' +
    '</div>';
  }).join('');
}

async function favConnect(localNode, remoteNode, btn) {
  var role = window._kioskRole || '';
  /* Single-connection rule applies to user role only */
  if (role !== 'admin' && role !== 'superuser') {
    var connSet = {};
    (window._lastBoardNodes || []).forEach(function(n) {
      (n.connected || []).forEach(function(c) { connSet[c.node] = true; });
    });
    if (Object.keys(connSet).length > 0) {
      sbToast('Disconnect the current node before connecting another', false);
      return;
    }
  }
  /* Favorites are never permanent; use the connect form + Permanent checkbox for that */
  await sbConnect(localNode, remoteNode, btn, false);
}

async function favMonitor(localNode, remoteNode, btn) {
  var role = window._kioskRole || '';
  if (role !== 'admin' && role !== 'superuser') {
    var connSet = {};
    (window._lastBoardNodes || []).forEach(function(n) {
      (n.connected || []).forEach(function(c) { connSet[c.node] = true; });
    });
    if (Object.keys(connSet).length > 0) {
      sbToast('Disconnect the current node before connecting another', false);
      return;
    }
  }
  await sbConnect(localNode, remoteNode, btn, false, true);
}

async function favDisconnect(localNode, remoteNode, btn) {
  await sbDisconnect(localNode, remoteNode, btn);
}

async function addToFavorites() {
  var inp = document.getElementById('conn-form-node');
  if (!inp) return;
  var node = inp.value.trim();
  if (!/^\d{4,7}$/.test(node)) {
    document.getElementById('conn-form-msg').textContent = 'Enter a 4-7 digit node number';

  }

  var d = await r.json();

async function removeFavorite(node) {
  var r = await apiFetch('/api/favorites/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({node: node})
  });
  if (r.status === 401) { openKioskLogin(null, null); return; }
  var d = await r.json();
  if (r.ok && d.success) {
    sbToast('Removed ' + node + ' from your Favorites', true);
    loadFavorites();
  }
}

/* ── Audio listen ── */
var _listenActive    = false;
var _listenNode      = '';
var _listenCtrl      = null;   // AbortController for in-flight fetch
var _listenObjURL    = null;   // MediaSource blob URL pending revoke
var _listenRenewTimer= null;   // safety-valve reconnect (30 min)
var _listenRateTimer = null;   // rate-control interval

/* MSE live-edge tuning.
   Instead of jumping, we speed up playback slightly when drifting behind.
   Chrome uses pitch-preserving WSOLA for playbackRate, so slight speedup is
   inaudible on voice. A hard jump is last resort only for extreme stalls.
     lag < 0.40s  → 1.00× (comfortable at live edge — wide dead-band for jitter)
     0.40–1.00s   → 1.05× (5% faster, imperceptible)
     1.00–3.00s   → 1.12× (12% faster, barely noticeable)
     > 3.00s      → hard jump to liveEdge−0.4s (leaves runway after recovery) */
var _LISTEN_KEEPBUF_S  = 2.0;            // trim buffer older than this behind playhead
var _LISTEN_RATE_MS    = 150;            // how often (ms) to run the rate controller
var _LISTEN_RENEW_MS   = 30 * 60 * 1000;

function toggleListen() {
  if (_listenActive) { _stopListen(); } else { _startListen(); }
}

function _listenSetBtn(html, color, disabled) {
  var btn = document.getElementById('listen-btn');
  if (!btn) return;
  btn.innerHTML = html;
  btn.style.color = color || '';
  btn.disabled = !!disabled;
  var note = document.getElementById('listen-delay-note');
  if (note) note.style.display = (color === 'var(--green)') ? '' : 'none';
}

function _startListen() {
  var node = (window._lastBoardNodes && window._lastBoardNodes[0])
             ? window._lastBoardNodes[0].node : '';
  if (!node) { sbToast('No local node found', false); return; }

  var audio = document.getElementById('node-audio');
  _listenSetBtn('... Connecting', 'var(--text2)', true);
  audio.onloadstart = null;
  audio.onerror     = null;

  apiFetch('/api/audio/check/' + node)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        _listenSetBtn('&#9834; Listen', '', false);
        sbToast('Audio unavailable: ' + (d.issues || []).join('; '), false);
        return;
      }
      _doStartListen(audio, node);
    })
    .catch(function(e) {
      _listenSetBtn('&#9834; Listen', '', false);
      sbToast('Check failed: ' + e.message, false);
    });
}

function _doStartListen(audio, node) {
  _listenNode = node;
  if (_listenRenewTimer) { clearTimeout(_listenRenewTimer); _listenRenewTimer = null; }
  if (_listenCtrl) { _listenCtrl.abort(); _listenCtrl = null; }
  if (_listenObjURL) { URL.revokeObjectURL(_listenObjURL); _listenObjURL = null; }

  /* Use MediaSource Extensions when available (Chrome/Firefox/Edge).
     MSE lets us control the buffer directly and jump to the live edge,
     eliminating the 5–30 s startup delay that the plain <audio src>
     element builds up before it decides to start playback. */
  if (typeof MediaSource !== 'undefined' &&
      MediaSource.isTypeSupported('audio/webm; codecs=opus')) {
    _doStartListenMSE(audio, node);
  } else {
    _doStartListenFallback(audio, node);
  }
}

function _doStartListenMSE(audio, node) {
  var ctrl = new AbortController();
  _listenCtrl = ctrl;

  var ms  = new MediaSource();
  var url = URL.createObjectURL(ms);
  _listenObjURL = url;

  /* pending: Uint8Arrays waiting to be appended to the SourceBuffer.
     cleaning: true while a sb.remove() is in progress (also blocks appendBuffer). */
  var pending  = [];
  var cleaning = false;

  function appendNext() {
    if (!sb || sb.updating || cleaning) return;

    /* Remove old data behind the playhead to prevent unbounded memory use */
    if (sb.buffered.length > 0 && audio.currentTime > _LISTEN_KEEPBUF_S + 1) {
      var cut = audio.currentTime - _LISTEN_KEEPBUF_S;
      var s0  = sb.buffered.start(0);
      if (cut > s0 + 0.1) {
        cleaning = true;
        try { sb.remove(s0, cut); } catch(e) { cleaning = false; }
        return;
      }
    }

    if (pending.length === 0) return;
    var chunk = pending.shift();
    try { sb.appendBuffer(chunk); }
    catch(e) { console.error('[AUDIO] appendBuffer:', e.name, e.message); }
  }

  var sb = null;

  ms.addEventListener('sourceopen', function() {
    URL.revokeObjectURL(url);
    _listenObjURL = null;

    try { sb = ms.addSourceBuffer('audio/webm; codecs=opus'); }
    catch(e) { sbToast('Codec not supported: ' + e.message, false); return; }
    sb.mode = 'sequence';

    sb.addEventListener('updateend', function() {
      cleaning = false;
      appendNext();
    });

    sb.addEventListener('error', function(e) {
      console.error('[AUDIO] SourceBuffer error', e);
    });

    /* Rate controller: runs every _LISTEN_RATE_MS and nudges playbackRate
       to gently chase the live edge without an audible jump. */
    if (_listenRateTimer) clearInterval(_listenRateTimer);
    _listenRateTimer = setInterval(function() {
      if (!_listenActive || !sb || sb.updating || !sb.buffered.length) return;
      if (audio.readyState < 2) return;  // skip while browser is still buffering startup
      var liveEdge = sb.buffered.end(sb.buffered.length - 1);
      var lag      = liveEdge - audio.currentTime;
      var rate;
      if (lag > 3.0) {
        audio.currentTime = liveEdge - 0.4;
        rate = 1.0;
        console.log('[AUDIO] emergency jump: lag=' + lag.toFixed(3) + 's');
      } else if (lag > 1.0) {
        rate = 1.12;
      } else if (lag > 0.4) {
        rate = 1.05;
      } else {
        rate = 1.0;
      }
      if (audio.playbackRate !== rate) {
        audio.playbackRate = rate;
        if (rate !== 1.0) console.log('[AUDIO] rate=' + rate + ' lag=' + lag.toFixed(3) + 's');
      }
    }, _LISTEN_RATE_MS);

    /* Fetch the stream and pump chunks into the SourceBuffer */
    apiFetch('/api/audio/stream/' + node, { signal: ctrl.signal })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);

        _listenActive = true;
        _listenSetBtn('&#9646;&#9646; Mute', 'var(--green)', false);
        sbToast('Monitoring node ' + node + ' — audio plays when active', true);
        console.log('[AUDIO] MSE connected to node', node, new Date().toISOString());

        var reader = r.body.getReader();
        function pump() {
          if (ctrl.signal.aborted) return;
          reader.read().then(function(result) {
            if (result.done || ctrl.signal.aborted) {
              try { ms.endOfStream(); } catch(e) {}
              return;
            }
            pending.push(result.value);
            appendNext();
            pump();
          }).catch(function(e) {
            if (e.name === 'AbortError') return;
            console.error('[AUDIO] stream read error:', e.message);
            if (_listenActive) {
              _listenActive = false;
              _listenSetBtn('&#9834; Listen', '', false);
              sbToast('Stream dropped — click Listen to reconnect', false);
            }
          });
        }
        pump();
      })
      .catch(function(e) {
        if (e.name === 'AbortError') return;
        _listenActive = false;
        _listenSetBtn('&#9834; Listen', '', false);
        sbToast('Audio stream error: ' + e.message, false);
      });
  });

  audio.onerror = function() {
    if (ctrl.signal.aborted) return;
    var codes = {1:'ABORTED',2:'NETWORK',3:'DECODE',4:'FORMAT'};
    var code = audio.error ? (codes[audio.error.code]||'ERR_'+audio.error.code) : 'unknown';
    var msg  = audio.error ? audio.error.message : '';
    console.error('[AUDIO] error', code, msg,
                  'networkState='+audio.networkState, 'readyState='+audio.readyState);
    _listenActive = false;
    _listenSetBtn('&#9834; Listen', '', false);
    sbToast('Audio error: ' + code + (msg ? ' — ' + msg : ''), false);
  };

  /* Stall recovery: when the browser fires 'waiting' (ran out of buffer),
     pause and poll until we have ≥800ms of forward buffer before resuming.
     This prevents choppy restarts from the browser playing on a thin buffer. */
  var _rebufferTimer = null;
  audio.addEventListener('waiting', function() {
    if (!_listenActive || ctrl.signal.aborted) return;
    if (_rebufferTimer) return;
    console.log('[AUDIO] stalled — waiting for rebuffer');
    _rebufferTimer = setInterval(function() {
      if (!_listenActive || ctrl.signal.aborted) {
        clearInterval(_rebufferTimer); _rebufferTimer = null; return;
      }
      if (!sb || !sb.buffered.length) return;
      var ahead = sb.buffered.end(sb.buffered.length - 1) - audio.currentTime;
      if (ahead >= 0.8) {
        clearInterval(_rebufferTimer); _rebufferTimer = null;
        console.log('[AUDIO] rebuffered (' + ahead.toFixed(2) + 's ahead) — resuming');
        audio.play().catch(function() {});
      }
    }, 100);
  });
  audio.addEventListener('playing', function() {
    if (_rebufferTimer) { clearInterval(_rebufferTimer); _rebufferTimer = null; }
  });

  audio.src = url;
  audio.play().catch(function(e) {
    if (ctrl.signal.aborted) return;
    console.error('[AUDIO] play() rejected:', e.name, e.message);
    _listenActive = false;
    _listenSetBtn('&#9834; Listen', '', false);
    sbToast('Playback blocked: ' + e.message, false);
  });

  /* Safety valve: force a clean reconnect every 30 minutes */
  _listenRenewTimer = setTimeout(function() {
    if (!_listenActive) return;
    console.log('[AUDIO] 30-min safety reconnect');
    _stopListen();
    setTimeout(function() { _startListen(); }, 500);
  }, _LISTEN_RENEW_MS);
}

function _doStartListenFallback(audio, node) {
  /* Plain <audio src> for browsers without MSE/WebM support (e.g., Safari).
     High-latency (browser buffers aggressively) but functional. */
  audio.onloadstart = function() {
    _listenActive = true;
    _listenSetBtn('&#9646;&#9646; Mute', 'var(--green)', false);
    sbToast('Monitoring node ' + node + ' — audio plays when active', true);
    console.log('[AUDIO] fallback src connected to node', node);
  };
  audio.onerror = function() {
    var codes = {1:'ABORTED',2:'NETWORK',3:'DECODE',4:'FORMAT'};
    var code = audio.error ? (codes[audio.error.code]||'ERR_'+audio.error.code) : 'unknown';
    _listenActive = false;
    _listenSetBtn('&#9834; Listen', '', false);
    sbToast('Audio error: ' + code, false);
  };
  audio.onended = function() {
    _listenActive = false;
    _listenSetBtn('&#9834; Listen', '', false);
    sbToast('Stream ended — click Listen to reconnect', false);
  };
  audio.src = '/api/audio/stream/' + node;
  audio.load();
  audio.play().catch(function(e) {
    _listenActive = false;
    _listenSetBtn('&#9834; Listen', '', false);
    sbToast('Playback blocked: ' + e.message, false);
    audio.src = '';
  });
  _listenRenewTimer = setTimeout(function() {
    if (!_listenActive) return;
    audio.pause(); audio.src = ''; audio.load();
    setTimeout(function() { _doStartListenFallback(audio, node); }, 500);
  }, 8 * 60 * 1000);
}

function _stopListen() {
  if (_listenRenewTimer) { clearTimeout(_listenRenewTimer);  _listenRenewTimer = null; }
  if (_listenRateTimer)  { clearInterval(_listenRateTimer);  _listenRateTimer  = null; }
  if (_listenCtrl) { _listenCtrl.abort(); _listenCtrl = null; }
  if (_listenObjURL) { URL.revokeObjectURL(_listenObjURL); _listenObjURL = null; }

  var audio = document.getElementById('node-audio');
  audio.playbackRate = 1.0;
  var node  = _listenNode || ((window._lastBoardNodes && window._lastBoardNodes[0])
              ? window._lastBoardNodes[0].node : '');
  audio.onloadstart = null;
  audio.onerror     = null;
  audio.pause();
  audio.src = '';
  audio.load();
  _listenActive = false;
  _listenNode   = '';
  _listenSetBtn('&#9834; Listen', '', false);
  if (node) {
    apiFetch('/api/audio/stop', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({node: node})
    }).catch(function(){});
  }
}

/* ── Boot ── */
initMap();
refreshBoard();
refreshWeather();
refreshActivity();
loadFavorites();
checkKioskSession();

setInterval(refreshBoard,    5000);    /* node status every 5s */
setInterval(refreshActivity, 15000);   /* activity every 15s */
setInterval(refreshWeather,  600000);  /* weather every 10min */
setInterval(updateGrayline,  120000);  /* grayline advances ~0.5° every 2min */
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL3-EZ Status Board</title>
<script>(function(){var t=localStorage.getItem('asl3ez-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
html[data-theme="midnight"] {
  --bg:      #000000; --bg2:    #0c0c0c; --bg3:    #141414;
  --border:  #252525; --accent: #4d9cf5; --green:  #3aad4e;
  --warn:    #c98a1a; --danger: #e04444; --text:   #dde1e7; --text2:  #636363;
}
html[data-theme="light"] {
  --bg:      #f6f8fa; --bg2:    #ffffff; --bg3:    #eaedf0;
  --border:  #d0d7de; --accent: #0969da; --green:  #1a7f37;
  --warn:    #9a6700; --danger: #cf222e; --text:   #1f2328; --text2:  #656d76;
}
html[data-theme="terminal"] {
  --bg:      #001200; --bg2:    #001a00; --bg3:    #002200;
  --border:  #1a4d1a; --accent: #00e040; --green:  #00c030;
  --warn:    #ffaa00; --danger: #ff3333; --text:   #00e040; --text2:  #007a1a;
}
html[data-theme="amber"] {
  --bg:      #0d0800; --bg2:    #160e00; --bg3:    #1e1500;
  --border:  #4a3200; --accent: #ff9200; --green:  #a0c040;
  --warn:    #ffb800; --danger: #ff4040; --text:   #ffb000; --text2:  #7a5200;
}
html[data-theme="nord"] {
  --bg:      #2e3440; --bg2:    #3b4252; --bg3:    #434c5e;
  --border:  #4c566a; --accent: #88c0d0; --green:  #a3be8c;
  --warn:    #ebcb8b; --danger: #bf616a; --text:   #eceff4; --text2:  #9099a8;
}
html[data-theme="mario"] {
  --bg:      #1a1464; --bg2:    #221a7a; --bg3:    #2e2490;
  --border:  #3c32b0; --accent: #e8000d; --green:  #1aaa00;
  --warn:    #f8c800; --danger: #f85000; --text:   #f8f8f8; --text2:  #c8b840;
}
html[data-theme="dracula"] {
  --bg:      #282a36; --bg2:    #1e2030; --bg3:    #343746;
  --border:  #44475a; --accent: #bd93f9; --green:  #50fa7b;
  --warn:    #f1fa8c; --danger: #ff5555; --text:   #f8f8f2; --text2:  #6272a4;
}
html[data-theme="monokai"] {
  --bg:      #272822; --bg2:    #1e1f1a; --bg3:    #3e3d32;
  --border:  #49483e; --accent: #66d9e8; --green:  #a6e22e;
  --warn:    #e6db74; --danger: #f92672; --text:   #f8f8f2; --text2:  #75715e;
}
html[data-theme="cyberpunk"] {
  --bg:      #0d0d1a; --bg2:    #12122a; --bg3:    #1a1a3a;
  --border:  #2a1a50; --accent: #ff00ff; --green:  #00ffaa;
  --warn:    #ffee00; --danger: #ff0066; --text:   #e8e0ff; --text2:  #8870cc;
}
html[data-theme="solarized"] {
  --bg:      #fdf6e3; --bg2:    #eee8d5; --bg3:    #e5dfc8;
  --border:  #cdc7b0; --accent: #268bd2; --green:  #859900;
  --warn:    #b58900; --danger: #dc322f; --text:   #657b83; --text2:  #93a1a1;
}
html[data-theme="cotton-candy"] {
  --bg:      #fdf0fc; --bg2:    #fff5fe; --bg3:    #f5e6f8;
  --border:  #ddb8e8; --accent: #b44cc0; --green:  #2e9e6e;
  --warn:    #c87820; --danger: #c83050; --text:   #2a1030; --text2:  #8850a0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #070a0f;
  --bg2:     #0d1117;
  --bg3:     #161b24;
  --border:  #21283a;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --warn:    #d29922;
  --danger:  #f85149;
  --text:    #e6edf3;
  --text2:   #8b949e;
  --mono:    'Courier New', Courier, monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 16px; line-height: 1.4; overflow: hidden; }

/* ── Root layout ── */
.board {
  display: flex; flex-direction: column;
  height: 100vh; padding: 16px 20px 12px; gap: 10px;
}

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-shrink: 0;
}
.header-brand { display: flex; align-items: center; gap: 8px; color: var(--text2);
  font-size: 0.9rem; letter-spacing: 0.06em; }
.header-brand strong { color: var(--accent); font-size: 1rem; }
.header-clock { font-size: 2.6rem; font-weight: 300; font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em; }
.header-actions { display: flex; align-items: center; gap: 10px; }

.ast-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border); }
.ast-pill.running { border-color: var(--green); color: var(--green); }
.ast-pill.stopped { border-color: var(--danger); color: var(--danger); }
.ast-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.btn-icon { background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.82rem;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: color .15s, border-color .15s; }
.btn-icon:hover { color: var(--text); border-color: var(--text2); }

/* ── Weather ticker ── */
.weather-bar {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 7px;
  padding: 5px 14px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  font-size: 0.85rem; overflow: hidden; min-height: 32px;
}
.weather-location { color: var(--accent); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.weather-sep { color: var(--border); flex-shrink: 0; }
.weather-items { display: flex; gap: 20px; flex-wrap: wrap; overflow: hidden; }
.weather-item { color: var(--text2); white-space: nowrap; }
.weather-item strong { color: var(--text); }
.weather-loading { color: var(--text2); font-style: italic; }

/* ── Main two-row content area ── */
.content-area { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

/* ── Top row: node + connected ── */
.top-row { display: grid; grid-template-columns: 260px 1fr; gap: 10px; flex: 55; min-height: 0; }

/* ── Node status card ── */
.node-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 16px; display: flex; flex-direction: column; align-items: center;
  gap: 8px; overflow: hidden;
}
.node-label { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--text2); text-transform: uppercase; }
.node-number { font-size: 2.4rem; font-weight: 700; line-height: 1; }
.node-callsign { font-size: 1.25rem; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
.node-location { font-size: 0.78rem; color: var(--text2); text-align: center; }

.keyed-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin: 6px 0 2px; }
.keyed-dot { width: 56px; height: 56px; border-radius: 50%; background: #222;
  border: 3px solid #333; transition: background .4s, border-color .4s, box-shadow .4s; }
.keyed-dot.keyed { background: var(--green); border-color: #5de073;
  box-shadow: 0 0 24px rgba(63,185,80,.65), 0 0 56px rgba(63,185,80,.25);
  animation: pulse-k 1.4s ease-in-out infinite; }
@keyframes pulse-k {
  0%,100% { box-shadow: 0 0 24px rgba(63,185,80,.65), 0 0 56px rgba(63,185,80,.25); }
  50%      { box-shadow: 0 0 38px rgba(63,185,80,.9),  0 0 75px rgba(63,185,80,.4);  }
}
.keyed-label { font-size: 1rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text2); }
.keyed-label.keyed { color: var(--green); }
.link-count { font-size: 0.82rem; color: var(--text2); }
.link-count span { color: var(--text); font-weight: 600; }

.vitals { width: 100%; margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px; }
.vrow { display: flex; justify-content: space-between; padding: 4px 0;
  border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.vrow:last-child { border-bottom: none; }
.vk { color: var(--text2); }
.vv { font-weight: 600; }
.vv.ok   { color: var(--green); }
.vv.warn { color: var(--warn); }

/* ── Connected nodes ── */
.connected-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.card-header { padding: 12px 18px 8px; border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
.card-title { font-size: 0.68rem; letter-spacing: .12em; color: var(--text2); text-transform: uppercase; }
.card-count { font-size: 0.82rem; color: var(--accent); font-weight: 600; }
.node-list { flex: 1; overflow-y: auto; }
.node-list::-webkit-scrollbar { width: 3px; }
.node-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.empty-msg { display: flex; align-items: center; justify-content: center; height: 100%;
  color: var(--text2); font-size: 0.95rem; min-height: 48px; }

.node-row { display: grid; grid-template-columns: 10px 88px 120px 1fr;
  gap: 0 14px; align-items: start; padding: 8px 18px;
  border-bottom: 1px solid var(--border); transition: background .15s; }
.node-row:last-child { border-bottom: none; }
.node-row:hover { background: var(--bg3); }
.nr-dot { width: 9px; height: 9px; border-radius: 50%; background: #2a2a2a; border: 1px solid #333;
  margin-top: 4px; }
.nr-dot.keyed { background: var(--green); border-color: var(--green);
  box-shadow: 0 0 5px rgba(63,185,80,.7); }
.nr-num  { font-size: 1.05rem; font-weight: 700; font-family: var(--mono); }
.nr-call { font-size: 0.95rem; font-weight: 600; color: var(--accent); letter-spacing: .03em; }
.nr-right { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.nr-loc  { font-size: 0.82rem; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.nr-meta { font-size: 0.72rem; color: var(--text2); display: flex; gap: 10px; flex-wrap: wrap; }
.nr-meta span { white-space: nowrap; }
.nr-meta strong { color: var(--text); }

/* ── Bottom row: activity + map ── */
.bottom-row { display: grid; grid-template-columns: 300px 1fr; gap: 10px; flex: 45; min-height: 0; }

/* ── Activity panel ── */
.activity-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.activity-list { flex: 1; overflow-y: auto; }
.activity-list::-webkit-scrollbar { width: 3px; }
.activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.act-row { display: grid; grid-template-columns: 8px 1fr; gap: 0 10px;
  align-items: center; padding: 8px 14px;
  border-bottom: 1px solid var(--border); transition: background .15s; }
.act-row:last-child { border-bottom: none; }
.act-row:hover { background: var(--bg3); }
.act-dot { width: 7px; height: 7px; border-radius: 50%; }
.act-dot.local  { background: var(--green); box-shadow: 0 0 4px rgba(63,185,80,.7); }
.act-dot.global { background: var(--accent); box-shadow: 0 0 4px rgba(88,166,255,.5); }
.act-body { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.act-top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
.act-node { font-size: 0.95rem; font-weight: 700; font-family: var(--mono); }
.act-call { font-size: 0.88rem; font-weight: 600; color: var(--accent); }
.act-loc  { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.act-ts   { font-size: 0.7rem; color: var(--text2); margin-left: auto; }
.act-badge { font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; font-weight: 600;
  letter-spacing: .04em; }
.act-badge.local  { background: rgba(63,185,80,.15); color: var(--green); }
.act-badge.global { background: rgba(88,166,255,.12); color: var(--accent); }

/* ── Map ── */
.map-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden; }
#map { flex: 1; background: #0d1117; }
.leaflet-container { background: #0d1117 !important; }
.leaflet-tile { filter: invert(90%) hue-rotate(180deg) brightness(0.85) saturate(0.8); }
#map.map-native .leaflet-tile { filter: none; }
.leaflet-control-zoom a { background: var(--bg3) !important; color: var(--text) !important;
  border-color: var(--border) !important; }
.map-ctl { display: flex; align-items: center; gap: 5px; margin-left: auto; flex-wrap: wrap; }
.map-ctl-sel { background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 4px; padding: 2px 5px; font-size: 0.7rem; cursor: pointer; }
.map-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; font-weight: 600;
  cursor: pointer; letter-spacing: .04em; transition: all .15s; white-space: nowrap; }
.map-btn.on { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* ── Footer ── */
.footer { display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 4px 14px; padding-top: 7px; border-top: 1px solid var(--border);
  font-size: 0.76rem; color: var(--text2); flex-shrink: 0; }
.f-stale { color: var(--warn); font-weight: 600; }
</style>
</head>
<body>

<div class="board">

  <!-- Header -->
  <header class="header">
    <div class="header-brand"><strong>ASL3-EZ</strong> <span>STATUS BOARD</span></div>
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-actions">
      <div class="ast-pill" id="ast-pill"><div class="dot"></div><span id="ast-text">Asterisk</span></div>
      <button class="btn-icon" onclick="toggleFS()" title="Fullscreen">&#x26F6; Fullscreen</button>
      <a class="btn-icon" href="/">&#8592; Dashboard</a>
    </div>
  </header>

  <!-- Weather bar -->
  <div class="weather-bar" id="weather-bar">
    <span class="weather-loading">Loading weather&hellip;</span>
  </div>

  <!-- Content -->
  <div class="content-area">

    <!-- Top row: node status + connected nodes -->
    <div class="top-row">

      <div class="node-card" id="node-card">
        <div class="node-label">NODE</div>
        <div style="color:var(--text2);font-size:.9rem">Loading&hellip;</div>
      </div>

      <div class="connected-card">
        <div class="card-header">
          <span class="card-title">Connected Nodes</span>
          <span class="card-count" id="conn-count"></span>
        </div>
        <div class="node-list" id="node-list">
          <div class="empty-msg">Loading&hellip;</div>
        </div>
      </div>

    </div>

    <!-- Bottom row: activity + map -->
    <div class="bottom-row">

      <div class="activity-card">
        <div class="card-header">
          <span class="card-title">Global Activity</span>
          <span class="card-count" id="act-count"></span>
        </div>
        <div class="activity-list" id="activity-list">
          <div class="empty-msg">Loading&hellip;</div>
        </div>
      </div>

      <div class="map-card">
        <div class="card-header">
          <span class="card-title">Network Map</span>
          <div class="map-ctl">
            <select class="map-ctl-sel" id="map-tile-sel" onchange="changeTiles(this.value)">
              <option value="dark">OSM Dark</option>
              <option value="carto-dk">Dark (CartoDB)</option>
              <option value="carto-lt">Light</option>
              <option value="topo">Topography</option>
              <option value="satellite">Satellite</option>
            </select>
            <button class="map-btn on" id="btn-global"   onclick="toggleLayer('global',this)">Global</button>
            <button class="map-btn on" id="btn-lines"    onclick="toggleLayer('lines',this)">Lines</button>
            <button class="map-btn on" id="btn-grayline" onclick="toggleLayer('grayline',this)">Grayline</button>
          </div>
        </div>
        <div id="map"></div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>ASL3 <strong id="f-asl">—</strong> &nbsp;|&nbsp; Asterisk <span id="f-ast-ver">—</span></span>
    <span>Updated: <span id="f-updated">—</span>
      <span id="f-stale" class="f-stale" style="display:none"> — DATA STALE</span></span>
    <span>Uptime: <strong id="f-uptime">—</strong> &nbsp;|&nbsp; Disk: <strong id="f-disk">—</strong></span>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ── Helpers ── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function relTime(ts) {
  var d = Math.floor(Date.now()/1000 - ts);
  if (d < 5)    return 'just now';
  if (d < 60)   return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}
function nowStr() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

/* ── Clock ── */
function tickClock() {
  document.getElementById('clock').textContent = nowStr();
}
setInterval(tickClock, 1000); tickClock();

/* ── Fullscreen ── */
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}

/* ── Leaflet map ── */
var _map            = null;
var _markers        = [];
var _lines          = [];
var _grayLayer      = null;
var _currentTile    = null;

/* Toggle state */
var _showGlobal   = true;
var _showLines    = true;
var _showGrayline = true;

/* Data state */
var _hostedNodes        = [];  /* [{node,callsign,location,lat,lon}] from board refresh */
var _connectedNodes     = [];  /* [{node,callsign,location,lat,lon,host_lat,host_lon}] */
var _lastActivityPoints = [];  /* combined activity list */
var _mapFitted          = false;

/* Tile layer definitions: darkFilter=true means keep OSM invert CSS */
var _tileDefs = {
  'dark':      { url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',           maxZoom:18, darkFilter:true  },
  'carto-dk':  { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',maxZoom:19, darkFilter:false },
  'carto-lt':  { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',maxZoom:19,darkFilter:false },
  'topo':      { url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',              maxZoom:17, darkFilter:false },
  'satellite': { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', maxZoom:18, darkFilter:false },
};

function changeTiles(key) {
  var def = _tileDefs[key] || _tileDefs['dark'];
  if (_currentTile) _map.removeLayer(_currentTile);
  _currentTile = L.tileLayer(def.url, {maxZoom: def.maxZoom}).addTo(_map);
  /* Move tile layer to bottom so markers stay on top */
  _currentTile.bringToBack();
  document.getElementById('map').classList.toggle('map-native', !def.darkFilter);
  localStorage.setItem('asl3ez-maptiles', key);
}

function toggleLayer(which, btn) {
  if (which === 'global')   _showGlobal   = !_showGlobal;
  if (which === 'lines')    _showLines    = !_showLines;
  if (which === 'grayline') _showGrayline = !_showGrayline;
  btn.classList.toggle('on');
  updateMap();
}

function initMap() {
  if (_map) return;
  _map = L.map('map', {
    zoomControl: true, attributionControl: false,
    center: [20, 0], zoom: 2,
  });

  /* Load saved tile pref */
  var saved = localStorage.getItem('asl3ez-maptiles') || 'dark';
  var sel = document.getElementById('map-tile-sel');
  if (sel) sel.value = saved;
  changeTiles(saved);

  _map.on('zoomend', function() { updateMap(); });
}

function pinSize() {
  if (!_map) return [16, 24];
  var z = _map.getZoom();
  if (z <= 2)  return [10, 15];
  if (z <= 4)  return [14, 21];
  if (z <= 6)  return [18, 27];
  if (z <= 8)  return [22, 33];
  return [26, 39];
}

function starSize() {
  if (!_map) return [24, 24];
  var z = _map.getZoom();
  if (z <= 2)  return [14, 14];
  if (z <= 4)  return [18, 18];
  if (z <= 6)  return [24, 24];
  if (z <= 8)  return [30, 30];
  return [36, 36];
}

function makeIcon(color) {
  var s = pinSize();
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + s[0] + '" height="' + s[1] +
    '" viewBox="0 0 20 30"><path d="M10 0C4.5 0 0 4.5 0 10c0 7.5 10 20 10 20S20 17.5 20 10C20 4.5 15.5 0 10 0z"' +
    ' fill="' + color + '" opacity="0.9"/><circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/></svg>';
  return L.divIcon({ html:svg, iconSize:s, iconAnchor:[s[0]/2,s[1]], popupAnchor:[0,-s[1]], className:'' });
}

function makeStarIcon(color) {
  var s = starSize();
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + s[0] + '" height="' + s[1] +
    '" viewBox="0 0 32 32"><polygon points="16,2 20,12 31,12 22,19 25,30 16,23 7,30 10,19 1,12 12,12"' +
    ' fill="' + color + '" stroke="white" stroke-width="1.5" opacity="0.95"/></svg>';
  return L.divIcon({ html:svg, iconSize:s, iconAnchor:[s[0]/2,s[1]/2], popupAnchor:[0,-s[1]/2], className:'' });
}

/* ── Grayline (day/night terminator) ── */
function _solarPos() {
  var d = new Date(), rad = Math.PI / 180;
  var n = d.getTime() / 86400000 - 10957.5;      /* days since J2000.0 */
  var L = (280.460 + 0.9856474 * n) % 360;
  var g = ((357.528 + 0.9856003 * n) % 360) * rad;
  var lam = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2*g)) * rad;
  var eps = (23.439 - 0.0000004 * n) * rad;
  var dec = Math.asin(Math.sin(eps) * Math.sin(lam)) / rad;
  var ra  = Math.atan2(Math.cos(eps) * Math.sin(lam), Math.cos(lam)) / rad;
  var GMST = ((280.46061837 + 360.98564736629 * n) % 360 + 360) % 360;
  var lonS = ((ra - GMST + 360) % 360);
  if (lonS > 180) lonS -= 360;
  return { dec: dec, lonS: lonS };
}

function _buildNightPoly() {
  var sol = _solarPos(), rad = Math.PI / 180;
  var dec = sol.dec, lonS = sol.lonS;
  if (Math.abs(dec) < 0.1) dec = 0.1;
  var pts = [];
  for (var lon = -180; lon <= 180; lon += 2) {
    var dL  = (lon - lonS) * rad;
    var lat = Math.atan(-Math.cos(dL) / Math.tan(dec * rad)) / rad;
    pts.push([lat, lon]);
  }
  if (dec > 0) { pts.push([-89.9, 180]); pts.push([-89.9, -180]); }
  else         { pts.push([ 89.9, 180]); pts.push([ 89.9, -180]); }
  return pts;
}

function updateGrayline() {
  if (_grayLayer) { _map.removeLayer(_grayLayer); _grayLayer = null; }
  if (!_showGrayline || !_map) return;
  var base = _buildNightPoly();
  var opts = { color:'transparent', fillColor:'#000020', fillOpacity:0.38, interactive:false };
  /* Render at -360°, 0°, +360° offsets so the overlay covers all repeated world copies
     that Leaflet shows at low zoom levels */
  var layers = [-360, 0, 360].map(function(off) {
    return L.polygon(base.map(function(p){ return [p[0], p[1] + off]; }), opts);
  });
  _grayLayer = L.layerGroup(layers).addTo(_map);
  layers.forEach(function(l){ try { l.bringToBack(); } catch(e){} });
}

/* ── Master map renderer ── */
function updateMap() {
  if (!_map) return;

  /* Clear markers and lines */
  _markers.forEach(function(m) { _map.removeLayer(m); });
  _markers = [];
  _lines.forEach(function(l) { _map.removeLayer(l); });
  _lines = [];

  var allPinned = [];

  /* 1. Hosted-node gold stars */
  _hostedNodes.forEach(function(n) {
    if (n.lat == null || n.lon == null) return;
    var m = L.marker([n.lat, n.lon], {icon:makeStarIcon('#ffd700'), zIndexOffset:1000})
      .bindPopup('<b>&#11088; ' + esc(n.callsign||n.node) + '</b><br>' +
                 esc(n.location||'') + '<br><small>Node ' + esc(n.node) + ' &mdash; this server</small>');
    m.addTo(_map); _markers.push(m);
    allPinned.push(n);
  });

  /* 2. Connected-node red pins + dashed lines to their hosted node */
  _connectedNodes.forEach(function(c) {
    if (c.lat == null || c.lon == null) return;
    var m = L.marker([c.lat, c.lon], {icon:makeIcon('#e74c3c'), zIndexOffset:500})
      .bindPopup('<b>' + esc(c.callsign||c.node) + '</b><br>' +
                 esc(c.location||'') + '<br><small>Node ' + esc(c.node) + ' &mdash; connected</small>');
    m.addTo(_map); _markers.push(m);
    allPinned.push(c);
    if (_showLines && c.host_lat != null && c.host_lon != null) {
      var line = L.polyline([[c.lat, c.lon], [c.host_lat, c.host_lon]], {
        color:'#e74c3c', weight:1.5, opacity:0.55, dashArray:'5 6', interactive:false
      }).addTo(_map);
      _lines.push(line);
    }
  });

  /* 3. Activity pins: local (green) always shown; global (blue) only if _showGlobal */
  var actPts = _lastActivityPoints.filter(function(p) {
    return p.lat != null && p.lon != null && (_showGlobal || p.type === 'local');
  });
  actPts.forEach(function(p) {
    var color = p.type === 'local' ? '#3fb950' : '#58a6ff';
    var m = L.marker([p.lat, p.lon], {icon:makeIcon(color)})
      .bindPopup('<b>' + esc(p.callsign||p.node) + '</b><br>' +
                 esc(p.location||'') + '<br><small>Node ' + esc(p.node) +
                 (p.type==='local' ? ' &mdash; keyed' : ' &mdash; online') + '</small>');
    m.addTo(_map); _markers.push(m);
    allPinned.push(p);
  });

  /* Auto-fit on first data load only */
  if (!_mapFitted && allPinned.length > 0) {
    var lats = allPinned.map(function(p){return p.lat;}).filter(function(v){return v!=null;});
    var lons = allPinned.map(function(p){return p.lon;}).filter(function(v){return v!=null;});
    if (lats.length) {
      _map.fitBounds([
        [Math.min.apply(null,lats)-3, Math.min.apply(null,lons)-3],
        [Math.max.apply(null,lats)+3, Math.max.apply(null,lons)+3]
      ], {padding:[15,15], maxZoom:7});
      _mapFitted = true;
    }
  }

  /* Grayline — rebuild each render so time stays current */
  updateGrayline();
}

/* ── Weather bar ── */
async function refreshWeather() {
  try {
    var r = await fetch('/api/status/weather');
    if (!r.ok) return;
    var w = await r.json();
    var bar = document.getElementById('weather-bar');
    if (w.error) {
      bar.innerHTML = '<span class="weather-loading">' + esc(w.error) + '</span>';
      return;
    }
    var temp = '';
    if (w.temp_f && w.temp_c) temp = w.temp_f + '°F / ' + w.temp_c + '°C';
    else if (w.temp_f) temp = w.temp_f + '°F';
    else if (w.temp_c) temp = w.temp_c + '°C';

    var html = '<span class="weather-location">&#127748; ' + esc(w.location) + '</span>';
    html += '<span class="weather-sep">|</span>';
    html += '<div class="weather-items">';
    if (w.desc)     html += '<span class="weather-item"><strong>' + esc(w.desc) + '</strong></span>';
    if (temp)       html += '<span class="weather-item">Temp: <strong>' + esc(temp) + '</strong></span>';
    if (w.humidity) html += '<span class="weather-item">Humidity: <strong>' + esc(w.humidity) + '%</strong></span>';
    if (w.wind_mph) html += '<span class="weather-item">Wind: <strong>' + esc(w.wind_mph) + ' mph ' + esc(w.wind_dir||'') + '</strong></span>';
    html += '</div>';
    bar.innerHTML = html;
  } catch(e) {}
}

/* ── Board data ── */
async function refreshBoard() {
  try {
    var r = await fetch('/api/status/board');
    if (!r.ok) return;
    var data = await r.json();

    /* Asterisk pill */
    var pill = document.getElementById('ast-pill');
    pill.className = 'ast-pill ' + (data.asterisk_active ? 'running' : 'stopped');
    document.getElementById('ast-text').textContent =
      data.asterisk_active ? 'Asterisk Running' : 'Asterisk Stopped';

    /* Node card */
    var nodes = data.nodes || [];
    window._lastBoardNodes = nodes;
    var nc = document.getElementById('node-card');
    if (!nodes.length) {
      nc.innerHTML = '<div class="node-label">NODE</div><div style="color:var(--text2)">No nodes configured</div>';
    } else {
      var n = nodes[0]; var keyed = n.keyed;
      var temp = data.cpu_temp != null ? data.cpu_temp + ' °C' : 'N/A';
      var tcls = data.cpu_temp != null ? (data.cpu_temp > 75 ? 'warn' : 'ok') : '';
      var disk = data.disk ? data.disk.used+'/'+data.disk.total+' ('+data.disk.pct+')' : 'N/A';
      nc.innerHTML =
        '<div class="node-label">NODE</div>' +
        '<div class="node-number">' + esc(n.node) + '</div>' +
        (n.callsign ? '<div class="node-callsign">' + esc(n.callsign) + '</div>' : '') +
        (n.location ? '<div class="node-location">' + esc(n.location) + '</div>' : '') +
        '<div class="keyed-wrap">' +
          '<div class="keyed-dot' + (keyed ? ' keyed' : '') + '"></div>' +
          '<div class="keyed-label' + (keyed ? ' keyed' : '') + '">' + (keyed ? 'KEYED' : 'IDLE') + '</div>' +
        '</div>' +
        '<div class="link-count">Linked: <span>' + (n.connected ? n.connected.length : 0) + '</span></div>' +
        (n.stale ? '<div style="font-size:.7rem;color:var(--warn)">&#9888; Stale</div>' : '') +
        '<div class="vitals">' +
          '<div class="vrow"><span class="vk">Uptime</span><span class="vv">' + esc(data.uptime||'—') + '</span></div>' +
          '<div class="vrow"><span class="vk">CPU Temp</span><span class="vv ' + tcls + '">' + esc(temp) + '</span></div>' +
          '<div class="vrow"><span class="vk">Disk</span><span class="vv">' + esc(disk) + '</span></div>' +
          '<div class="vrow"><span class="vk">AMI</span><span class="vv ' + (data.ami_connected ? 'ok':'warn') + '">' + (data.ami_connected ? 'Connected':'Connecting') + '</span></div>' +
        '</div>';
    }

    /* Update hosted-node star pins */
    _hostedNodes = nodes.filter(function(n){ return n.lat != null && n.lon != null; })
      .map(function(n){ return {node:n.node, callsign:n.callsign, location:n.location, lat:n.lat, lon:n.lon}; });

    /* Connected nodes with lat/lon for red map pins */
    _connectedNodes = [];
    nodes.forEach(function(n) {
      (n.connected||[]).forEach(function(c) {
        if (c.lat != null && c.lon != null) {
          _connectedNodes.push({
            node:c.node, callsign:c.callsign, location:c.location,
            lat:c.lat, lon:c.lon,
            host_lat:n.lat, host_lon:n.lon,
          });
        }
      });
    });

    /* Connected nodes */
    var allLinked = [];
    nodes.forEach(function(n) { (n.connected||[]).forEach(function(c){ allLinked.push(c); }); });
    var nl = document.getElementById('node-list');
    document.getElementById('conn-count').textContent = allLinked.length ? allLinked.length + ' linked' : '';
    if (!allLinked.length) {
      nl.innerHTML = '<div class="empty-msg">No nodes linked</div>';
    } else {
      nl.innerHTML = allLinked.map(function(c) {
        var meta = [];
        if (c.connect_time) meta.push('Conn: <strong>' + esc(c.connect_time) + '</strong>');
        if (c.keyups)       meta.push('Keys: <strong>' + c.keyups + '</strong>');
        if (c.last_keyed)   meta.push('Last: <strong>' + relTime(c.last_keyed) + '</strong>');
        return '<div class="node-row">' +
          '<div class="nr-dot' + (c.keyed ? ' keyed' : '') + '"></div>' +
          '<div class="nr-num">' + esc(c.node) + '</div>' +
          '<div class="nr-call">' + esc(c.callsign||'—') + '</div>' +
          '<div class="nr-right">' +
            '<div class="nr-loc">' + esc(c.location||c.desc||'') + '</div>' +
            (meta.length ? '<div class="nr-meta"><span>' + meta.join('</span><span>') + '</span></div>' : '') +
          '</div>' +
        '</div>';
      }).join('');
    }

    /* Footer */
    document.getElementById('f-asl').textContent    = data.asl_version || '—';
    document.getElementById('f-ast-ver').textContent = data.asterisk_version || '—';
    document.getElementById('f-uptime').textContent  = data.uptime || '—';
    var d2 = data.disk;
    document.getElementById('f-disk').textContent   = d2 ? d2.used+'/'+d2.total : '—';
    document.getElementById('f-updated').textContent = nowStr();
    var anyStale = (data.nodes||[]).some(function(n){ return n.stale; });
    document.getElementById('f-stale').style.display = anyStale ? '' : 'none';

    /* Re-render map whenever board data changes */
    updateMap();
  } catch(e) {}
}

/* ── Activity feed + map ── */
async function refreshActivity() {
  try {
    var r = await fetch('/api/status/activity');
    if (!r.ok) return;
    var data = await r.json();

    /* Exclude nodes that are currently connected — they belong in the connected-nodes panel */
    var connectedSet = {};
    _connectedNodes.forEach(function(c) { connectedSet[c.node] = true; });
    /* Also build connected set from all linked nodes (covers nodes without geocoords) */
    var allLinkedNow = [];
    (window._lastBoardNodes||[]).forEach(function(n){ (n.connected||[]).forEach(function(c){ allLinkedNow.push(c.node); }); });
    allLinkedNow.forEach(function(id){ connectedSet[id] = true; });

    var keyed   = (data.recently_keyed || []).filter(function(e){ return !connectedSet[e.node]; });
    var globals = (data.global_nodes   || []).filter(function(g){ return !connectedSet[g.node]; });

    /* Deduplicate: local entries take priority */
    var seenNodes = {};
    keyed.forEach(function(e) { seenNodes[e.node] = true; });
    var globalOnly = globals.filter(function(g) { return !seenNodes[g.node]; });

    var combined = keyed.slice(0,5).map(function(e) {
      return {node:e.node, callsign:e.callsign, location:e.location,
              lat:e.lat, lon:e.lon, ts:e.ts, type:'local'};
    }).concat(globalOnly.slice(0, Math.max(0, 10-Math.min(keyed.length,5))).map(function(g) {
      return {node:g.node, callsign:g.callsign, location:g.location,
              lat:g.lat, lon:g.lon, ts:g.ts, type:'global'};
    }));

    /* Activity list — no keyed/online badge, just source dot + node info */
    var al = document.getElementById('activity-list');
    document.getElementById('act-count').textContent = combined.length ? combined.length + ' nodes' : '';
    if (!combined.length) {
      al.innerHTML = '<div class="empty-msg">No activity data yet</div>';
    } else {
      al.innerHTML = combined.map(function(e) {
        return '<div class="act-row">' +
          '<div class="act-dot ' + e.type + '"></div>' +
          '<div class="act-body">' +
            '<div class="act-top">' +
              '<span class="act-node">' + esc(e.node) + '</span>' +
              (e.callsign ? '<span class="act-call">' + esc(e.callsign) + '</span>' : '') +
              '<span class="act-ts">' + (e.ts ? relTime(e.ts) : '') + '</span>' +
            '</div>' +
            '<div class="act-loc">' + esc(e.location||'') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    _lastActivityPoints = combined;
    updateMap();
  } catch(e) {}
}

/* ── Boot ── */
initMap();
refreshBoard();
refreshWeather();
refreshActivity();

setInterval(refreshBoard,    5000);    /* node status every 5s */
setInterval(refreshActivity, 15000);   /* activity every 15s */
setInterval(refreshWeather,  600000);  /* weather every 10min */
setInterval(updateGrayline,  120000);  /* grayline advances ~0.5° every 2min */
</script>
</body>
</html>

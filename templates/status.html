<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL3-EZ Status Board</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #070a0f;
  --bg2:     #0d1117;
  --bg3:     #161b24;
  --border:  #21283a;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --warn:    #d29922;
  --danger:  #f85149;
  --text:    #e6edf3;
  --text2:   #8b949e;
  --mono:    'Courier New', Courier, monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 16px; line-height: 1.4; overflow: hidden; }

/* ── Root layout ── */
.board {
  display: flex; flex-direction: column;
  height: 100vh; padding: 16px 20px 12px; gap: 10px;
}

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-shrink: 0;
}
.header-brand { display: flex; align-items: center; gap: 8px; color: var(--text2);
  font-size: 0.9rem; letter-spacing: 0.06em; }
.header-brand strong { color: var(--accent); font-size: 1rem; }
.header-clock { font-size: 2.6rem; font-weight: 300; font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em; }
.header-actions { display: flex; align-items: center; gap: 10px; }

.ast-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: 1px solid var(--border); }
.ast-pill.running { border-color: var(--green); color: var(--green); }
.ast-pill.stopped { border-color: var(--danger); color: var(--danger); }
.ast-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.btn-icon { background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.82rem;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: color .15s, border-color .15s; }
.btn-icon:hover { color: var(--text); border-color: var(--text2); }

/* ── Weather ticker ── */
.weather-bar {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 7px;
  padding: 5px 14px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  font-size: 0.85rem; overflow: hidden; min-height: 32px;
}
.weather-location { color: var(--accent); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.weather-sep { color: var(--border); flex-shrink: 0; }
.weather-items { display: flex; gap: 20px; flex-wrap: wrap; overflow: hidden; }
.weather-item { color: var(--text2); white-space: nowrap; }
.weather-item strong { color: var(--text); }
.weather-loading { color: var(--text2); font-style: italic; }

/* ── Main two-row content area ── */
.content-area { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

/* ── Top row: node + connected ── */
.top-row { display: grid; grid-template-columns: 260px 1fr; gap: 10px; flex: 55; min-height: 0; }

/* ── Node status card ── */
.node-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 16px; display: flex; flex-direction: column; align-items: center;
  gap: 8px; overflow: hidden;
}
.node-label { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--text2); text-transform: uppercase; }
.node-number { font-size: 2.4rem; font-weight: 700; line-height: 1; }
.node-callsign { font-size: 1.25rem; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
.node-location { font-size: 0.78rem; color: var(--text2); text-align: center; }

.keyed-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; margin: 6px 0 2px; }
.keyed-dot { width: 56px; height: 56px; border-radius: 50%; background: #222;
  border: 3px solid #333; transition: background .4s, border-color .4s, box-shadow .4s; }
.keyed-dot.keyed { background: var(--green); border-color: #5de073;
  box-shadow: 0 0 24px rgba(63,185,80,.65), 0 0 56px rgba(63,185,80,.25);
  animation: pulse-k 1.4s ease-in-out infinite; }
@keyframes pulse-k {
  0%,100% { box-shadow: 0 0 24px rgba(63,185,80,.65), 0 0 56px rgba(63,185,80,.25); }
  50%      { box-shadow: 0 0 38px rgba(63,185,80,.9),  0 0 75px rgba(63,185,80,.4);  }
}
.keyed-label { font-size: 1rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text2); }
.keyed-label.keyed { color: var(--green); }
.link-count { font-size: 0.82rem; color: var(--text2); }
.link-count span { color: var(--text); font-weight: 600; }

.vitals { width: 100%; margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px; }
.vrow { display: flex; justify-content: space-between; padding: 4px 0;
  border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.vrow:last-child { border-bottom: none; }
.vk { color: var(--text2); }
.vv { font-weight: 600; }
.vv.ok   { color: var(--green); }
.vv.warn { color: var(--warn); }

/* ── Connected nodes ── */
.connected-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.card-header { padding: 12px 18px 8px; border-bottom: 1px solid var(--border);
  display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
.card-title { font-size: 0.68rem; letter-spacing: .12em; color: var(--text2); text-transform: uppercase; }
.card-count { font-size: 0.82rem; color: var(--accent); font-weight: 600; }
.node-list { flex: 1; overflow-y: auto; }
.node-list::-webkit-scrollbar { width: 3px; }
.node-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.empty-msg { display: flex; align-items: center; justify-content: center; height: 100%;
  color: var(--text2); font-size: 0.95rem; min-height: 48px; }

.node-row { display: grid; grid-template-columns: 10px 88px 120px 1fr;
  gap: 0 14px; align-items: center; padding: 9px 18px;
  border-bottom: 1px solid var(--border); transition: background .15s; }
.node-row:last-child { border-bottom: none; }
.node-row:hover { background: var(--bg3); }
.nr-dot { width: 9px; height: 9px; border-radius: 50%; background: #2a2a2a; border: 1px solid #333; }
.nr-dot.keyed { background: var(--green); border-color: var(--green);
  box-shadow: 0 0 5px rgba(63,185,80,.7); }
.nr-num  { font-size: 1.05rem; font-weight: 700; font-family: var(--mono); }
.nr-call { font-size: 0.95rem; font-weight: 600; color: var(--accent); letter-spacing: .03em; }
.nr-loc  { font-size: 0.82rem; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }

/* ── Bottom row: activity + map ── */
.bottom-row { display: grid; grid-template-columns: 300px 1fr; gap: 10px; flex: 45; min-height: 0; }

/* ── Activity panel ── */
.activity-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden;
}
.activity-list { flex: 1; overflow-y: auto; }
.activity-list::-webkit-scrollbar { width: 3px; }
.activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.act-row { display: grid; grid-template-columns: 8px 1fr; gap: 0 10px;
  align-items: center; padding: 8px 14px;
  border-bottom: 1px solid var(--border); transition: background .15s; }
.act-row:last-child { border-bottom: none; }
.act-row:hover { background: var(--bg3); }
.act-dot { width: 7px; height: 7px; border-radius: 50%; }
.act-dot.local  { background: var(--green); box-shadow: 0 0 4px rgba(63,185,80,.7); }
.act-dot.global { background: var(--accent); box-shadow: 0 0 4px rgba(88,166,255,.5); }
.act-body { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.act-top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
.act-node { font-size: 0.95rem; font-weight: 700; font-family: var(--mono); }
.act-call { font-size: 0.88rem; font-weight: 600; color: var(--accent); }
.act-loc  { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; }
.act-ts   { font-size: 0.7rem; color: var(--text2); margin-left: auto; }
.act-badge { font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; font-weight: 600;
  letter-spacing: .04em; }
.act-badge.local  { background: rgba(63,185,80,.15); color: var(--green); }
.act-badge.global { background: rgba(88,166,255,.12); color: var(--accent); }

/* ── Map ── */
.map-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  display: flex; flex-direction: column; overflow: hidden; }
#map { flex: 1; background: #0d1117; }
.leaflet-container { background: #0d1117 !important; }
.leaflet-tile { filter: invert(90%) hue-rotate(180deg) brightness(0.85) saturate(0.8); }
.leaflet-control-zoom a { background: var(--bg3) !important; color: var(--text) !important;
  border-color: var(--border) !important; }

/* ── Footer ── */
.footer { display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 4px 14px; padding-top: 7px; border-top: 1px solid var(--border);
  font-size: 0.76rem; color: var(--text2); flex-shrink: 0; }
.f-stale { color: var(--warn); font-weight: 600; }
</style>
</head>
<body>

<div class="board">

  <!-- Header -->
  <header class="header">
    <div class="header-brand"><strong>ASL3-EZ</strong> <span>STATUS BOARD</span></div>
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-actions">
      <div class="ast-pill" id="ast-pill"><div class="dot"></div><span id="ast-text">Asterisk</span></div>
      <button class="btn-icon" onclick="toggleFS()" title="Fullscreen">&#x26F6; Fullscreen</button>
      <a class="btn-icon" href="/">&#8592; Dashboard</a>
    </div>
  </header>

  <!-- Weather bar -->
  <div class="weather-bar" id="weather-bar">
    <span class="weather-loading">Loading weather&hellip;</span>
  </div>

  <!-- Content -->
  <div class="content-area">

    <!-- Top row: node status + connected nodes -->
    <div class="top-row">

      <div class="node-card" id="node-card">
        <div class="node-label">NODE</div>
        <div style="color:var(--text2);font-size:.9rem">Loading&hellip;</div>
      </div>

      <div class="connected-card">
        <div class="card-header">
          <span class="card-title">Connected Nodes</span>
          <span class="card-count" id="conn-count"></span>
        </div>
        <div class="node-list" id="node-list">
          <div class="empty-msg">Loading&hellip;</div>
        </div>
      </div>

    </div>

    <!-- Bottom row: activity + map -->
    <div class="bottom-row">

      <div class="activity-card">
        <div class="card-header">
          <span class="card-title">Global Activity</span>
          <span class="card-count" id="act-count"></span>
        </div>
        <div class="activity-list" id="activity-list">
          <div class="empty-msg">Loading&hellip;</div>
        </div>
      </div>

      <div class="map-card">
        <div class="card-header">
          <span class="card-title">Network Map</span>
          <span class="card-count" id="map-count"></span>
        </div>
        <div id="map"></div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>ASL3 <strong id="f-asl">—</strong> &nbsp;|&nbsp; Asterisk <span id="f-ast-ver">—</span></span>
    <span>Updated: <span id="f-updated">—</span>
      <span id="f-stale" class="f-stale" style="display:none"> — DATA STALE</span></span>
    <span>Uptime: <strong id="f-uptime">—</strong> &nbsp;|&nbsp; Disk: <strong id="f-disk">—</strong></span>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ── Helpers ── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function relTime(ts) {
  var d = Math.floor(Date.now()/1000 - ts);
  if (d < 5)    return 'just now';
  if (d < 60)   return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}
function nowStr() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

/* ── Clock ── */
function tickClock() {
  document.getElementById('clock').textContent = nowStr();
}
setInterval(tickClock, 1000); tickClock();

/* ── Fullscreen ── */
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen().catch(function(){});
}

/* ── Leaflet map ── */
var _map = null;
var _markers = [];

function initMap() {
  if (_map) return;
  _map = L.map('map', {
    zoomControl: true, attributionControl: false,
    center: [20, 0], zoom: 2,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(_map);
  /* Dark OSM overlay via CSS filter is already applied */
}

function makeIcon(color) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="30" viewBox="0 0 20 30">' +
    '<path d="M10 0C4.5 0 0 4.5 0 10c0 7.5 10 20 10 20S20 17.5 20 10C20 4.5 15.5 0 10 0z"' +
    ' fill="' + color + '" opacity="0.9"/>' +
    '<circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/></svg>';
  return L.divIcon({ html: svg, iconSize: [20,30], iconAnchor: [10,30],
    popupAnchor: [0,-30], className: '' });
}

function makeStarIcon(color) {
  /* 5-pointed star for the hosted node */
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
    '<polygon points="16,2 20,12 31,12 22,19 25,30 16,23 7,30 10,19 1,12 12,12"' +
    ' fill="' + color + '" stroke="white" stroke-width="1.5" opacity="0.95"/></svg>';
  return L.divIcon({ html: svg, iconSize: [32,32], iconAnchor: [16,16],
    popupAnchor: [0,-16], className: '' });
}

var _hostedNodes = [];         /* [{node, callsign, location, lat, lon}] — set by refreshBoard */
var _lastActivityPoints = [];  /* last combined activity list — used to redraw map on board refresh */

function updateMap(points) {
  if (!_map) return;
  _markers.forEach(function(m) { _map.removeLayer(m); });
  _markers = [];

  /* Activity pins (global/local) */
  var valid = points.filter(function(p) { return p.lat != null && p.lon != null; });
  valid.forEach(function(p) {
    var color = p.type === 'local' ? '#3fb950' : '#58a6ff';
    var m = L.marker([p.lat, p.lon], {icon: makeIcon(color)})
      .bindPopup(
        '<b>' + esc(p.callsign||p.node) + '</b><br>' +
        esc(p.location||'') + '<br>' +
        '<small>Node ' + esc(p.node) + (p.type==='local' ? ' &mdash; keyed' : ' &mdash; online') + '</small>'
      );
    m.addTo(_map);
    _markers.push(m);
  });

  /* Star pins for hosted (this server's) nodes */
  _hostedNodes.forEach(function(n) {
    if (n.lat == null || n.lon == null) return;
    var m = L.marker([n.lat, n.lon], {icon: makeStarIcon('#ffd700'), zIndexOffset: 1000})
      .bindPopup(
        '<b>&#11088; ' + esc(n.callsign||n.node) + '</b><br>' +
        esc(n.location||'') + '<br>' +
        '<small>Node ' + esc(n.node) + ' &mdash; this server</small>'
      );
    m.addTo(_map);
    _markers.push(m);
  });

  var allPinned = valid.concat(_hostedNodes.filter(function(n){ return n.lat != null; }));
  document.getElementById('map-count').textContent =
    allPinned.length ? allPinned.length + ' pin' + (allPinned.length !== 1 ? 's' : '') : '';

  if (allPinned.length > 0) {
    var lats = allPinned.map(function(p){ return p.lat; });
    var lons = allPinned.map(function(p){ return p.lon; });
    _map.fitBounds([
      [Math.min.apply(null,lats)-3, Math.min.apply(null,lons)-3],
      [Math.max.apply(null,lats)+3, Math.max.apply(null,lons)+3]
    ], {padding: [15,15], maxZoom: 7});
  }
}

/* ── Weather bar ── */
async function refreshWeather() {
  try {
    var r = await fetch('/api/status/weather');
    if (!r.ok) return;
    var w = await r.json();
    var bar = document.getElementById('weather-bar');
    if (w.error) {
      bar.innerHTML = '<span class="weather-loading">' + esc(w.error) + '</span>';
      return;
    }
    var temp = '';
    if (w.temp_f && w.temp_c) temp = w.temp_f + '°F / ' + w.temp_c + '°C';
    else if (w.temp_f) temp = w.temp_f + '°F';
    else if (w.temp_c) temp = w.temp_c + '°C';

    var html = '<span class="weather-location">&#127748; ' + esc(w.location) + '</span>';
    html += '<span class="weather-sep">|</span>';
    html += '<div class="weather-items">';
    if (w.desc)     html += '<span class="weather-item"><strong>' + esc(w.desc) + '</strong></span>';
    if (temp)       html += '<span class="weather-item">Temp: <strong>' + esc(temp) + '</strong></span>';
    if (w.humidity) html += '<span class="weather-item">Humidity: <strong>' + esc(w.humidity) + '%</strong></span>';
    if (w.wind_mph) html += '<span class="weather-item">Wind: <strong>' + esc(w.wind_mph) + ' mph ' + esc(w.wind_dir||'') + '</strong></span>';
    html += '</div>';
    bar.innerHTML = html;
  } catch(e) {}
}

/* ── Board data ── */
async function refreshBoard() {
  try {
    var r = await fetch('/api/status/board');
    if (!r.ok) return;
    var data = await r.json();

    /* Asterisk pill */
    var pill = document.getElementById('ast-pill');
    pill.className = 'ast-pill ' + (data.asterisk_active ? 'running' : 'stopped');
    document.getElementById('ast-text').textContent =
      data.asterisk_active ? 'Asterisk Running' : 'Asterisk Stopped';

    /* Node card */
    var nodes = data.nodes || [];
    var nc = document.getElementById('node-card');
    if (!nodes.length) {
      nc.innerHTML = '<div class="node-label">NODE</div><div style="color:var(--text2)">No nodes configured</div>';
    } else {
      var n = nodes[0]; var keyed = n.keyed;
      var temp = data.cpu_temp != null ? data.cpu_temp + ' °C' : 'N/A';
      var tcls = data.cpu_temp != null ? (data.cpu_temp > 75 ? 'warn' : 'ok') : '';
      var disk = data.disk ? data.disk.used+'/'+data.disk.total+' ('+data.disk.pct+')' : 'N/A';
      nc.innerHTML =
        '<div class="node-label">NODE</div>' +
        '<div class="node-number">' + esc(n.node) + '</div>' +
        (n.callsign ? '<div class="node-callsign">' + esc(n.callsign) + '</div>' : '') +
        (n.location ? '<div class="node-location">' + esc(n.location) + '</div>' : '') +
        '<div class="keyed-wrap">' +
          '<div class="keyed-dot' + (keyed ? ' keyed' : '') + '"></div>' +
          '<div class="keyed-label' + (keyed ? ' keyed' : '') + '">' + (keyed ? 'KEYED' : 'IDLE') + '</div>' +
        '</div>' +
        '<div class="link-count">Linked: <span>' + (n.connected ? n.connected.length : 0) + '</span></div>' +
        (n.stale ? '<div style="font-size:.7rem;color:var(--warn)">&#9888; Stale</div>' : '') +
        '<div class="vitals">' +
          '<div class="vrow"><span class="vk">Uptime</span><span class="vv">' + esc(data.uptime||'—') + '</span></div>' +
          '<div class="vrow"><span class="vk">CPU Temp</span><span class="vv ' + tcls + '">' + esc(temp) + '</span></div>' +
          '<div class="vrow"><span class="vk">Disk</span><span class="vv">' + esc(disk) + '</span></div>' +
          '<div class="vrow"><span class="vk">AMI</span><span class="vv ' + (data.ami_connected ? 'ok':'warn') + '">' + (data.ami_connected ? 'Connected':'Connecting') + '</span></div>' +
        '</div>';
    }

    /* Update hosted-node star pins */
    _hostedNodes = nodes.filter(function(n){ return n.lat != null && n.lon != null; })
      .map(function(n){ return {node:n.node, callsign:n.callsign, location:n.location, lat:n.lat, lon:n.lon}; });

    /* Connected nodes */
    var allLinked = [];
    nodes.forEach(function(n) { (n.connected||[]).forEach(function(c){ allLinked.push(c); }); });
    var nl = document.getElementById('node-list');
    document.getElementById('conn-count').textContent = allLinked.length ? allLinked.length + ' linked' : '';
    if (!allLinked.length) {
      nl.innerHTML = '<div class="empty-msg">No nodes linked</div>';
    } else {
      nl.innerHTML = allLinked.map(function(c) {
        return '<div class="node-row">' +
          '<div class="nr-dot' + (c.keyed ? ' keyed' : '') + '"></div>' +
          '<div class="nr-num">' + esc(c.node) + '</div>' +
          '<div class="nr-call">' + esc(c.callsign||'—') + '</div>' +
          '<div class="nr-loc">' + esc(c.location||c.desc||'') + '</div>' +
        '</div>';
      }).join('');
    }

    /* Footer */
    document.getElementById('f-asl').textContent    = data.asl_version || '—';
    document.getElementById('f-ast-ver').textContent = data.asterisk_version || '—';
    document.getElementById('f-uptime').textContent  = data.uptime || '—';
    var d2 = data.disk;
    document.getElementById('f-disk').textContent   = d2 ? d2.used+'/'+d2.total : '—';
    document.getElementById('f-updated').textContent = nowStr();
    var anyStale = (data.nodes||[]).some(function(n){ return n.stale; });
    document.getElementById('f-stale').style.display = anyStale ? '' : 'none';

    /* Re-render map star pins whenever board data changes */
    updateMap(_lastActivityPoints);
  } catch(e) {}
}

/* ── Activity feed + map ── */
async function refreshActivity() {
  try {
    var r = await fetch('/api/status/activity');
    if (!r.ok) return;
    var data = await r.json();

    var keyed   = data.recently_keyed || [];
    var globals = data.global_nodes   || [];

    /* Deduplicate: local entries take priority */
    var seenNodes = {};
    keyed.forEach(function(e) { seenNodes[e.node] = true; });
    var globalOnly = globals.filter(function(g) { return !seenNodes[g.node]; });

    var combined = keyed.slice(0,5).map(function(e) {
      return {node:e.node, callsign:e.callsign, location:e.location,
              lat:e.lat, lon:e.lon, ts:e.ts, type:'local'};
    }).concat(globalOnly.slice(0, Math.max(0, 10-Math.min(keyed.length,5))).map(function(g) {
      return {node:g.node, callsign:g.callsign, location:g.location,
              lat:g.lat, lon:g.lon, ts:g.ts, type:'global'};
    }));

    /* Activity list */
    var al = document.getElementById('activity-list');
    document.getElementById('act-count').textContent = combined.length ? combined.length + ' nodes' : '';
    if (!combined.length) {
      al.innerHTML = '<div class="empty-msg">No activity data yet</div>';
    } else {
      al.innerHTML = combined.map(function(e) {
        return '<div class="act-row">' +
          '<div class="act-dot ' + e.type + '"></div>' +
          '<div class="act-body">' +
            '<div class="act-top">' +
              '<span class="act-node">' + esc(e.node) + '</span>' +
              (e.callsign ? '<span class="act-call">' + esc(e.callsign) + '</span>' : '') +
              '<span class="act-badge ' + e.type + '">' + (e.type==='local' ? 'KEYED' : 'ONLINE') + '</span>' +
              '<span class="act-ts">' + (e.ts ? relTime(e.ts) : '') + '</span>' +
            '</div>' +
            '<div class="act-loc">' + esc(e.location||'') + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    _lastActivityPoints = combined;
    updateMap(combined);
  } catch(e) {}
}

/* ── Boot ── */
initMap();
refreshBoard();
refreshWeather();
refreshActivity();

setInterval(refreshBoard,    5000);   /* node status every 5s */
setInterval(refreshActivity, 15000);  /* activity every 15s (server caches for 5min, no extra requests) */
setInterval(refreshWeather,  600000); /* weather every 10min */
</script>
